<!DOCTYPE html>
<html lang="sv">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#12151a">
  <meta name="description" content="WallFlow — följ ledbyggnationen i klätterhallen.">
  <title>WallFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --bg: #12151a;
      --line: rgba(255, 255, 255, 0.08);
      --text: #f2efe8;
      --muted: #9aa3b2;
      --accent: #e8a54b;
      --accent-2: #6ec8b0;
      --rebuild: #e8a54b;
      --ok: #6ec8b0;
      --unset: #9aa3b2;
      --search-h: 52px;
      --nav-h: 64px;
      --radius: 18px;
      --font-display: "Syne", sans-serif;
      --font-body: "Figtree", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: var(--font-body);
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(232, 165, 75, 0.16), transparent 55%),
        radial-gradient(900px 500px at 100% 0%, rgba(110, 200, 176, 0.12), transparent 50%),
        linear-gradient(180deg, #161a21 0%, var(--bg) 40%, #0e1116 100%);
      overflow: hidden;
    }
    #loading-screen {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #0e1116;
      transition: opacity .45s ease, visibility .45s ease;
    }
    #loading-screen.hide { opacity: 0; visibility: hidden; pointer-events: none; }
    .brand-mark {
      font-family: var(--font-display); font-weight: 800;
      font-size: clamp(2.6rem, 10vw, 3.6rem); letter-spacing: -0.04em; line-height: 0.95; margin: 0;
      background: linear-gradient(120deg, #fff 10%, var(--accent) 55%, var(--accent-2) 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      animation: brandIn .8s ease both;
    }
    .brand-sub {
      margin-top: 10px; color: var(--muted); letter-spacing: 0.18em;
      text-transform: uppercase; font-size: 0.72rem; animation: brandIn .8s ease .12s both;
    }
    .loader-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
      margin-top: 28px; animation: pulseDot 1.1s ease-in-out infinite;
    }
    @keyframes brandIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    @keyframes pulseDot { 0%, 100% { transform: scale(1); opacity: .55; } 50% { transform: scale(1.35); opacity: 1; } }
    @keyframes riseIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
    @keyframes fadeSlide { from { opacity: 0; transform: translateX(8px); } to { opacity: 1; transform: none; } }

    #app-public { display: none; flex-direction: column; height: 100%; min-height: 100dvh; position: relative; }
    .topbar {
      position: sticky; top: 0; z-index: 30;
      padding: calc(12px + var(--safe-top)) 16px 10px;
      background: linear-gradient(180deg, rgba(18,21,26,.96), rgba(18,21,26,.82) 70%, transparent);
      backdrop-filter: blur(10px);
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      grid-template-areas:
        "brand search account"
        "filters filters filters";
      gap: 10px 12px;
      align-items: center;
    }
    .top-brand {
      grid-area: brand;
      font-family: var(--font-display); font-weight: 800; font-size: 1.35rem; letter-spacing: -0.03em;
    }
    .top-brand span { color: var(--accent); }
    .search-wrap {
      grid-area: search;
      display: flex; align-items: center; gap: 8px; min-width: 0;
      height: var(--search-h); padding: 0 12px; border-radius: 14px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--line);
    }
    .search-wrap input { flex: 1; min-width: 0; border: 0; outline: 0; background: transparent; color: var(--text); font-size: 0.95rem; }
    .search-wrap input::placeholder { color: #6f7888; }
    .icon-btn {
      border: 0; background: transparent; color: var(--muted);
      width: 36px; height: 36px; border-radius: 10px; display: grid; place-items: center; cursor: pointer;
    }
    .icon-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
    .filters-block {
      grid-area: filters;
      display: flex; flex-direction: column; gap: 6px; min-width: 0;
    }
    .filter-row { display: flex; gap: 8px; overflow-x: auto; padding: 0; scrollbar-width: none; }
    .filter-row::-webkit-scrollbar { display: none; }
    /* Mobil: WallFlow + konto, sedan filter under rubriken, sedan sök */
    @media (max-width: 720px) {
      .topbar {
        grid-template-columns: 1fr auto;
        grid-template-areas:
          "brand account"
          "filters filters"
          "search search";
      }
    }
    .chip {
      flex: 0 0 auto; border: 1px solid var(--line); background: rgba(255,255,255,0.03);
      color: var(--muted); border-radius: 999px; padding: 8px 14px; font-size: 0.82rem;
      font-weight: 600; cursor: pointer; transition: background .2s, color .2s, transform .2s;
    }
    .chip:hover { transform: translateY(-1px); }
    .chip.active { color: #12151a; background: var(--accent); border-color: transparent; }
    .chip[data-key="Ja"].active { background: var(--rebuild); }
    .chip[data-key="Nej"].active { background: var(--ok); }
    .chip[data-key="EJ"].active { background: var(--unset); color: #12151a; }
    .scroll-area { flex: 1; min-height: 0; overflow-y: auto; padding: 8px 16px calc(98px + var(--safe-bottom)); }
    .hero-line { margin: 8px 0 18px; animation: riseIn .5s ease both; }
    .hero-line h1 {
      font-family: var(--font-body);
      font-size: clamp(1.2rem, 4.2vw, 1.65rem);
      font-weight: 600;
      letter-spacing: -0.015em;
      margin: 0 0 6px;
      line-height: 1.2;
      color: var(--text);
    }
    .hero-line .hero-title-short { display: none; }
    @media (max-width: 420px) {
      .hero-line .hero-title-full { display: none; }
      .hero-line .hero-title-short { display: inline; }
    }
    .hero-line p { margin: 0; color: var(--muted); font-size: 0.9rem; max-width: 40ch; }
    .color-dist {
      margin-bottom: 18px;
      padding: 14px;
      border-radius: var(--radius);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
      animation: riseIn .5s ease both;
    }
    .color-dist-pie-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .color-dist-pie {
      width: min(220px, 62vw); height: auto; display: block;
      filter: drop-shadow(0 10px 24px rgba(0,0,0,0.35));
    }
    .color-dist-pie path {
      cursor: pointer;
      stroke: rgba(18,21,26,0.55);
      stroke-width: 1.2;
      transition: opacity .2s ease, transform .2s ease;
      transform-origin: 50% 50%;
    }
    .color-dist-pie path:hover { opacity: 0.9; }
    .color-dist-pie path.is-active {
      stroke: #f2efe8;
      stroke-width: 2;
      filter: brightness(1.08);
    }
    .color-dist-center-label {
      fill: var(--text);
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      text-anchor: middle;
    }
    .color-dist-center-sub {
      fill: var(--muted);
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 600;
      text-anchor: middle;
    }
    .color-dist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
      gap: 10px;
      width: 100%;
    }
    .color-dist-card {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 12px 8px; border-radius: 14px;
      background: rgba(0,0,0,0.22); border: 1px solid transparent;
      cursor: pointer; transition: border-color .2s, transform .2s;
    }
    .color-dist-card:hover { border-color: rgba(232,165,75,0.4); transform: translateY(-2px); }
    .color-dist-card.active { border-color: rgba(232,165,75,0.65); }
    .color-dist-blob {
      width: 36px; height: 36px; border-radius: 50%;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.18), 0 6px 14px rgba(0,0,0,0.25);
    }
    .color-dist-card .color-dist-count {
      font-family: var(--font-body);
      font-size: 1.25rem;
      line-height: 1;
      letter-spacing: -0.01em;
      color: #f7f4ee;
      font-weight: 400;
    }
    .color-dist-card .color-dist-name {
      color: #c4ccd8;
      font-size: 0.78rem;
      font-weight: 500;
      text-align: center;
    }
    .stats {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
      margin-bottom: 20px; animation: riseIn .55s ease .05s both;
    }
    @media (max-width: 520px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
    .stat {
      padding: 14px 12px; border-radius: 16px;
      background: linear-gradient(160deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      border: 1px solid var(--line);
      width: 100%; text-align: left; color: inherit; cursor: pointer;
      transition: border-color .2s, transform .2s, background .2s;
    }
    .stat:hover { border-color: rgba(232,165,75,0.4); transform: translateY(-1px); }
    .stat.active { border-color: rgba(232,165,75,0.7); background: rgba(232,165,75,0.1); }
    .stat strong { display: block; font-family: var(--font-display); font-size: 1.45rem; line-height: 1; margin-bottom: 4px; }
    .stat span { color: var(--muted); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .section-label {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
      margin: 18px 0 10px; overflow: visible;
    }
    .section-label h2 {
      /* Figtree: Syne-descenders (g) klipptes i flex under statistikboxarna */
      font-family: var(--font-body);
      font-size: 1.05rem;
      font-weight: 600;
      margin: 0;
      letter-spacing: -0.01em;
      line-height: 1.5;
      overflow: visible;
      flex: 1 1 auto;
      min-width: 0;
    }
    .section-label span {
      color: var(--muted); font-size: 0.8rem; line-height: 1.5; flex: 0 0 auto; padding-top: 0.15em;
    }
    .color-block {
      margin-bottom: 14px; border-radius: var(--radius); background: rgba(255,255,255,0.03);
      border: 1px solid var(--line); overflow: hidden; animation: riseIn .5s ease both;
    }
    .color-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 14px 14px 10px; cursor: pointer; }
    .color-head h3 { margin: 0; font-family: var(--font-display); font-size: 1.05rem; letter-spacing: -0.02em; }
    .color-head small { color: var(--muted); }
    .route-list { padding: 0 10px 10px; display: grid; gap: 8px; }
    .route-row {
      display: grid; grid-template-columns: 10px 1fr auto; gap: 10px; align-items: center;
      padding: 12px; border-radius: 14px; background: rgba(0,0,0,0.22); border: 1px solid transparent;
      cursor: pointer; transition: border-color .2s, transform .2s, background .2s; animation: fadeSlide .35s ease both;
    }
    .route-row:hover { border-color: rgba(232,165,75,0.35); transform: translateX(2px); background: rgba(0,0,0,0.32); }
    .route-dot { width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 0 3px rgba(255,255,255,0.04); }
    .route-main { min-width: 0; }
    .route-main strong { display: block; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .route-main span { display: block; color: var(--muted); font-size: 0.78rem; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badge-rebuild {
      display: inline-block; padding: 4px 8px; border-radius: 999px; font-size: 0.68rem;
      font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase; color: #12151a;
    }
    .badge-rebuild.Ja { background: var(--rebuild); }
    .badge-rebuild.Nej { background: var(--ok); }
    .empty { text-align: center; color: var(--muted); padding: 40px 16px; border: 1px dashed var(--line); border-radius: var(--radius); }
    .modern-nav {
      position: fixed; left: 50%; bottom: calc(18px + var(--safe-bottom)); transform: translateX(-50%);
      width: min(420px, calc(100% - 24px)); height: var(--nav-h); display: flex; gap: 6px; padding: 6px;
      border-radius: 999px; background: rgba(20, 24, 31, 0.88); border: 1px solid var(--line);
      backdrop-filter: blur(14px); z-index: 40; box-shadow: 0 16px 40px rgba(0,0,0,0.35);
    }
    .nav-item {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; border-radius: 999px;
      color: var(--muted); cursor: pointer; font-weight: 700; font-size: 0.82rem; transition: all .25s ease;
    }
    .nav-item.active { background: rgba(255,255,255,0.08); color: var(--text); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06); }
    #panel {
      position: fixed; left: 0; right: 0; bottom: 0; max-height: min(82vh, 720px); background: #171b22;
      border-radius: 22px 22px 0 0; border: 1px solid var(--line); border-bottom: 0; z-index: 50;
      transform: translateY(110%); transition: transform .35s cubic-bezier(.2,.8,.2,1);
      display: flex; flex-direction: column; box-shadow: 0 -20px 60px rgba(0,0,0,0.45);
    }
    #panel.open { transform: translateY(0); }
    .panel-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; padding: 16px 16px 10px; border-bottom: 1px solid var(--line); overflow: visible; }
    .panel-header h5 {
      font-family: var(--font-body);
      font-size: 1.2rem;
      font-weight: 600;
      margin: 0;
      letter-spacing: -0.01em;
      line-height: 1.5;
      overflow: visible;
      flex: 1 1 auto;
      min-width: 0;
    }
    .panel-header .icon-btn { flex: 0 0 auto; margin-top: 1px; }
    #panel-body { overflow-y: auto; padding: 14px 16px calc(24px + var(--safe-bottom)); }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0 16px; }
    .detail-cell { padding: 12px; border-radius: 14px; background: rgba(255,255,255,0.03); border: 1px solid var(--line); }
    .detail-cell label { display: block; color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .detail-cell strong { font-size: 0.95rem; }
    #app-public.ready { display: flex; }
    #login-panel, #app-admin { position: fixed; inset: 0; z-index: 80; background: #10141a; display: none; flex-direction: column; }
    #login-panel.show, #app-admin.show { display: flex; }
    .account-chip {
      grid-area: account;
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
      padding: 0 4px 0 10px; height: 40px; border-radius: 12px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--line);
      color: var(--muted); font-size: 0.78rem; font-weight: 600;
    }
    .account-chip strong { color: var(--text); font-weight: 700; max-width: 88px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .login-inner { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-card { width: min(360px, 100%); transition: opacity .25s ease; }
    .login-card.is-busy .form-control,
    .login-card.is-busy .form-select { opacity: 0.55; }
    .login-card h2 { font-family: var(--font-display); font-weight: 800; letter-spacing: -0.03em; margin: 0 0 6px; }
    #login-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      min-height: 48px;
    }
    #login-btn .login-spinner {
      display: none; width: 1.05rem; height: 1.05rem;
      border: 2px solid rgba(18,21,26,0.25); border-top-color: #12151a;
      border-radius: 50%; animation: loginSpin .7s linear infinite; flex: 0 0 auto;
    }
    #login-btn.is-loading .login-spinner { display: inline-block; }
    #login-btn.is-loading { cursor: wait; }
    #login-status {
      display: none; margin-top: 14px; text-align: center;
      color: var(--muted); font-size: 0.88rem;
    }
    #login-status.show {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      animation: riseIn .35s ease both;
    }
    #login-status .login-status-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
      animation: pulseDot 1.1s ease-in-out infinite;
    }
    @keyframes loginSpin { to { transform: rotate(360deg); } }
    .form-label {
      color: var(--muted); font-size: 0.78rem; font-weight: 600; margin-bottom: 4px;
    }
    .form-control, .form-select {
      background: rgba(255,255,255,0.04) !important; border: 1px solid var(--line) !important;
      color: var(--text) !important; border-radius: 12px !important;
    }
    .form-control:focus, .form-select:focus {
      border-color: rgba(232,165,75,0.55) !important; box-shadow: 0 0 0 3px rgba(232,165,75,0.15) !important;
    }
    .btn-accent { background: var(--accent); border: 0; color: #12151a; font-weight: 700; border-radius: 12px; }
    .btn-accent:hover { filter: brightness(1.05); color: #12151a; }
    .btn-ghost { background: transparent; border: 1px solid var(--line); color: var(--text); border-radius: 12px; }
    .admin-shell { max-width: 820px; margin: 0 auto; width: 100%; padding: 16px 16px calc(40px + var(--safe-bottom)); overflow-y: auto; flex: 1; }
    .admin-card { background: rgba(255,255,255,0.03); border: 1px solid var(--line); border-radius: 16px; padding: 14px; margin-bottom: 12px; }
    .admin-card h3, .admin-card h4 { font-family: var(--font-display); letter-spacing: -0.02em; margin: 0 0 10px; }
    .toast-wrap { position: fixed; left: 50%; bottom: calc(92px + var(--safe-bottom)); transform: translateX(-50%); z-index: 100; pointer-events: none; }
    .toast-msg {
      background: #243041; border: 1px solid var(--line); color: var(--text); padding: 10px 14px;
      border-radius: 12px; font-size: 0.88rem; opacity: 0; transition: opacity .25s; box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    .toast-msg.show { opacity: 1; }
    .demo-banner {
      margin: 0 16px 10px; padding: 8px 12px; border-radius: 12px;
      background: rgba(232,165,75,0.12); border: 1px solid rgba(232,165,75,0.28);
      color: #f0d2a4; font-size: 0.78rem; font-weight: 600;
    }
    .color-swatch {
      width: 14px; height: 14px; border-radius: 50%; display: inline-block; vertical-align: -2px;
      margin-right: 6px; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2);
    }
    .topo-img {
      width: 100%; max-height: 160px; object-fit: cover; object-position: center;
      border-radius: 14px; margin-top: 10px; border: 1px solid var(--line);
      cursor: zoom-in; display: block; background: #0a0c10;
    }
    .route-img-lightbox {
      position: fixed; inset: 0; z-index: 130;
      background: rgba(5, 6, 8, 0.94);
      display: none; align-items: center; justify-content: center;
      padding: 12px; padding-top: max(12px, env(safe-area-inset-top));
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      cursor: zoom-out;
    }
    .route-img-lightbox.open { display: flex; }
    .route-img-lightbox img {
      max-width: 100%; max-height: 100%; width: auto; height: auto;
      object-fit: contain; border-radius: 8px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      cursor: zoom-out;
    }
    body.route-img-lightbox-open { overflow: hidden; }
    .img-editor { margin-bottom: 14px; }
    .img-editor-empty {
      padding: 22px 16px; text-align: center; color: var(--muted); font-size: 0.9rem;
      border: 1px dashed var(--line); border-radius: 14px; margin-bottom: 10px;
    }
    .img-editor-preview-wrap {
      border-radius: 14px; overflow: hidden; border: 1px solid var(--line);
      background: #0a0c10; margin-bottom: 10px; max-height: 160px;
    }
    .img-editor-preview-wrap img {
      display: block; width: 100%; height: 160px; object-fit: cover; object-position: center;
    }
    .img-editor-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .img-editor-actions .btn { flex: 1 1 auto; min-width: 120px; }
    .img-editor-hint { color: var(--muted); font-size: 0.78rem; margin-top: 8px; }
    .img-editor-status { color: var(--accent); font-size: 0.82rem; margin-top: 6px; min-height: 1.2em; }

    /* Fullskärm: markera led på foto */
    .img-mark-overlay {
      position: fixed; inset: 0; z-index: 120;
      background: #0a0c10; color: var(--text);
      display: none; flex-direction: column;
      padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
    }
    .img-mark-overlay.open { display: flex; }
    .img-mark-prompt {
      flex: 0 0 auto; padding: 14px 16px 10px; text-align: center;
      border-bottom: 1px solid var(--line);
    }
    .img-mark-prompt strong {
      display: block; font-size: 1.05rem; font-weight: 700; letter-spacing: -0.02em;
    }
    .img-mark-prompt span {
      display: block; margin-top: 4px; color: var(--muted); font-size: 0.85rem; line-height: 1.35;
    }
    .img-mark-stage {
      flex: 1 1 auto; min-height: 0; display: flex; align-items: center; justify-content: center;
      padding: 8px; touch-action: none; overflow: hidden; background: #050608;
    }
    .img-mark-stage canvas {

const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzw_23y8uDOGJneWK7sPDAJdaUbOFvHX2X7Xq4qnZ3NF8IjDbNRIcayxFKGof9mg2yglA/exec";
const USE_DEMO = !GAS_API_URL || GAS_API_URL.includes("PASTE_");

function apiCall_(action, args) {
  if (USE_DEMO) return demoApi_(action, args || []);

  return fetch(GAS_API_URL, {
    method: "POST",

}

function createRunProxy_() {
  let successHandler = null;
  let failureHandler = null;
  const proxy = new Proxy({}, {
    get(_target, prop) {
      if (prop === "withSuccessHandler") return (fn) => { successHandler = fn; return proxy; };
      if (prop === "withFailureHandler") return (fn) => { failureHandler = fn; return proxy; };
      return (...args) => {
        apiCall_(String(prop), args)
          .then((res) => {
            if (String(prop) === "verifyAdminPassword" && res && res.token) __sessionToken = res.token;
            if (successHandler) successHandler(res);
          })
          .catch((err) => { if (failureHandler) failureHandler(err); });
      };
    }
  });
  return proxy;
}

function loadDemoDb_() {
  try {
    const raw = localStorage.getItem(DEMO_STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && Array.isArray(parsed.routes)) return parsed;
    }
  } catch (_) {}
  const seeded = seedDemoDb_();
  saveDemoDb_(seeded);
  return seeded;
}
function saveDemoDb_(data) { localStorage.setItem(DEMO_STORAGE_KEY, JSON.stringify(data)); }

function demoApi_(action, args) {
  return new Promise((resolve) => {
    setTimeout(() => {
      const store = loadDemoDb_();
      const ok = (data) => resolve(data);
      const fail = (msg) => resolve({ ok: false, error: msg || "Fel" });

      if (action === "getAppData") {
        const meUser = (store.users || []).find((x) => x.username === currentUser.username);
        return ok({
          routes: store.routes,
          grades: store.grades || DEFAULT_GRADES.slice(),
          me: meUser ? { username: meUser.username, name: meUser.name || "", role: meUser.role } : null
        });
      }
      if (action === "verifyAdminPassword") {
        const [user, pw] = args;
        const u = (store.users || []).find((x) => x.username === String(user || "").trim() && x.password === String(pw || ""));
        if (!u) return ok({ authorized: false });
        __sessionToken = "demo-token-admin";
        return ok({ authorized: true, token: __sessionToken, role: u.role, username: u.username, name: u.name, firstLogin: !!u.FirstLogin });
      }
      if (__sessionToken !== "demo-token-admin" && action !== "getAppData") return fail("Ej inloggad");

      if (action === "uploadRouteImage") {
        const payload = args[0] || {};
        const raw = String(payload.dataBase64 || "");
        if (!raw) return fail("Ingen bilddata");
        // Demoläge: behåll data-URL lokalt (ingen Drive)
        const dataUrl = raw.indexOf("data:") === 0 ? raw : ("data:" + (payload.mimeType || "image/jpeg") + ";base64," + raw.replace(/^data:[^;]+;base64,/, ""));
        return ok({ ok: true, fileId: dataUrl, url: dataUrl, name: "led-" + (payload.nr || "x") + ".jpg" });
      }
      if (action === "deleteRouteImage") {
        return ok({ ok: true });
      }
      if (action === "saveRoute") {
        const [route] = args;
        const role = String(currentUser.role || "").toLowerCase();
        const isSuper = role === "superadmin";
        const grades = store.grades || DEFAULT_GRADES;
        const g = String(route.Gradering || "").trim().toLowerCase();
        const okGrade = WILDCARD_NAMES.includes(g) || g === "ej uppsatt" || grades.some((x) => String(x).toLowerCase() === g);
        if (!okGrade) {
          return fail("Ogiltig gradering. Tillåtna: " + grades.join(", ") + ", Wildcard, Ej uppsatt");
        }
        if (route.Nr) {
          const i = store.routes.findIndex((r) => String(r.Nr) === String(route.Nr));
          if (i >= 0) {
            store.routes[i] = { ...store.routes[i], ...route };
          } else if (!isSuper) {
            return fail("Bara superadmin kan lägga till leder");
          } else {
            store.routes.push(route);
          }
        } else if (!isSuper) {
          return fail("Bara superadmin kan lägga till leder");
        } else {
          const max = store.routes.reduce((m, r) => Math.max(m, Number(r.Nr) || 0), 0);
          route.Nr = String(max + 1);
          store.routes.push(route);
        }
        saveDemoDb_(store);
        return ok({ ok: true, route });
      }
      if (action === "deleteRoute") {
        if (String(currentUser.role || "").toLowerCase() !== "superadmin") {
          return fail("Bara superadmin kan ta bort leder");
        }
        const [nr] = args;
        store.routes = store.routes.filter((r) => String(r.Nr) !== String(nr));
        saveDemoDb_(store);
        return ok({ ok: true });
      }
      if (action === "getAllAdmins") {
        return ok((store.users || []).map((u) => ({ username: u.username, name: u.name, role: u.role })));
      }
      if (action === "createNewAdmin") {
        const payload = args[0] || {};
        if ((store.users || []).some((u) => u.username === payload.username)) return fail("Användaren finns redan");
        store.users.push({ username: payload.username, name: payload.name || "", role: payload.role || "admin", password: payload.password || "changeme", FirstLogin: true });
        saveDemoDb_(store);
        return ok({ ok: true });
      }
      if (action === "updateUserRole") {
        const [username, role] = args;
        const u = (store.users || []).find((x) => x.username === username);
        if (!u) return fail("Hittades inte");
        u.role = role;
        saveDemoDb_(store);
        return ok({ ok: true });
      }
      if (action === "deleteUserAction") {
        store.users = (store.users || []).filter((u) => u.username !== args[0]);
        saveDemoDb_(store);
        return ok({ ok: true });
      }
      if (action === "changeOwnPassword" || action === "finalizeUserPassword") {
        const u = (store.users || []).find((x) => x.username === currentUser.username);
        if (!u) return fail("Hittades inte");
        if (action === "changeOwnPassword" && u.password !== args[0]) return fail("Fel lösenord");
        u.password = action === "finalizeUserPassword" ? args[1] : args[1];
        u.FirstLogin = false;
        saveDemoDb_(store);
        return ok({ ok: true });
      }
      return fail("Okänd action: " + action);
    }, 80);
  });
}

/* ---------- Helpers ---------- */
function escapeHtml_(str) {
  return String(str == null ? "" : str)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}
function colorHex_(name) {

}
function gradeList_() {
  return (db.grades && db.grades.length) ? db.grades.slice() : DEFAULT_GRADES.slice();
}
function isWildcardGrade_(name) {
  return WILDCARD_NAMES.includes(String(name || "").trim().toLowerCase());
}
function isEjUppsattGrade_(name) {
  return String(name || "").trim().toLowerCase().replace(/\s+/g, " ") === "ej uppsatt";
}

}
function isWildcardNr_(nr) {
  return /^w\d+$/i.test(String(nr == null ? "" : nr).trim());
}
function isAllowedGrade_(name) {
  const t = String(name || "").trim().toLowerCase();
  return gradeList_().some((g) => String(g).toLowerCase() === t);

  return m ? decodeURIComponent(m[1]) : "";
}

function saveSession_(remember) {
  const payload = {
    token: __sessionToken,
    username: currentUser.username,
    name: currentUser.name || "",
    role: currentUser.role,
    firstLogin: !!currentUser.firstLogin,

  };

function restoreSession_() {
  let raw = localStorage.getItem(SESSION_STORAGE_KEY) || sessionStorage.getItem(SESSION_STORAGE_KEY);
  if (!raw) return false;
  try {
    const s = JSON.parse(raw);
    if (!s || !s.token || !s.username) return false;
    __sessionToken = s.token;
    currentUser = {
      authorized: true,
      username: s.username,
      name: s.name || "",
      role: s.role || "admin",
      firstLogin: !!s.firstLogin
    };

  /* Redigera sker via ledkortet; + Ny led ligger under Inställningar för superadmin. */
}
function isWildcardRoute_(r) {
  return isWildcardNr_(r && r.Nr) || isWildcardGrade_(r && r.Gradering);
}
/** Förstavyn: lednummer stigande, alla wildcards (W1/W2 …) sist. */
function sortRoutes_(routes) {
  return routes.slice().sort((a, b) => {
    const aw = isWildcardRoute_(a);
    const bw = isWildcardRoute_(b);
    if (aw !== bw) return aw ? 1 : -1;

    const na = Number(a.Nr), nb = Number(b.Nr);
    const aNum = !isNaN(na) && String(a.Nr) !== "";
    const bNum = !isNaN(nb) && String(b.Nr) !== "";
    if (aNum && bNum) return na - nb;
    if (aNum) return -1;
    if (bNum) return 1;

    if (isWildcardNr_(a.Nr) && isWildcardNr_(b.Nr)) {
      return (Number(String(a.Nr).replace(/^w/i, "")) || 0) - (Number(String(b.Nr).replace(/^w/i, "")) || 0);
    }
    return String(a.Nr || "").localeCompare(String(b.Nr || ""), "sv", { numeric: true, sensitivity: "base" });
  });
}
function routeKey_(r) {
  return String(r.Nr != null && r.Nr !== "" ? r.Nr : ("x-" + (r.Gradering || "") + "-" + (r.Byggdatum || "") + "-" + (r.Anteckningar || "")));
}
function routeByNr_(nr) {
  return db.routes.find((r) => String(r.Nr) === String(nr));
}
function normalizeRoute_(r) {
  return {
    Nr: r.Nr == null ? "" : String(r.Nr),
    Gradering: String(r.Gradering || "").trim(),
    DagsAttByggaOm: (function () {
      const raw = String(r.DagsAttByggaOm || r["Dags att bygga om"] || "").trim();
      const low = raw.toLowerCase();
      if (low === "ja") return "Ja";
      if (low === "nej") return "Nej";
      if (isDashStatus_(raw)) return "-";
      return raw;
    })(),
    Ledbyggare: String(r.Ledbyggare || ""),
    Byggdatum: String(r.Byggdatum || "").slice(0, 10),
    Slutdatum: String(r.Slutdatum || "").slice(0, 10),
    Anteckningar: String(r.Anteckningar || ""),
    Bild: String(r.Bild || "")
  };
}

window.addEventListener("load", () => {

function bootAppData_() {
  renderFilters();
  google.script.run
    .withSuccessHandler((data) => {
      db.routes = ((data && data.routes) || []).map(normalizeRoute_);
      db.grades = (data && data.grades && data.grades.length) ? data.grades.slice() : DEFAULT_GRADES.slice();
      if (colorFilter !== "ALL" && !isListableGrade_(colorFilter)) colorFilter = "ALL";
      // Uppdatera visningsnamn från Users-fliken (aldrig användarnamn som Ledbyggare-default)

        currentUser = { authorized: false, role: null, username: null, firstLogin: false };

/** Grades i sheet-ordning, plus Wildcard / Ej uppsatt om de används. */
function availableColors_() {
  const list = gradeList_();
  const ensure = (label) => {
    if (!label) return;
    if (!list.some((g) => String(g).toLowerCase() === String(label).toLowerCase())) list.push(label);
  };
  const wc = db.routes.find((r) => isWildcardGrade_(r.Gradering) || isWildcardNr_(r.Nr));
  if (wc) ensure(isWildcardGrade_(wc.Gradering) ? String(wc.Gradering).trim() : "Wildcard");
  // Ej uppsatt ska alltid gå att välja/filtrera (ligger under Grades i sheetet)
  ensure(EJ_UPPSATT_GRADE);
  const eu = db.routes.find((r) => isEjUppsattGrade_(r.Gradering));
  if (eu) ensure(String(eu.Gradering).trim() || EJ_UPPSATT_GRADE);
  return list;
}

/** Kanoniskt färg-/graderingsnamn för filter och färgvyn. */
function gradeBucketKey_(r) {
  const g = r && r.Gradering;
  if (isEjUppsattGrade_(g)) return EJ_UPPSATT_GRADE;
  if (isWildcardGrade_(g) || isWildcardNr_(r && r.Nr)) {
    const wc = availableColors_().find((c) => WILDCARD_NAMES.includes(String(c).toLowerCase()));
    return wc || "Wildcard";
  }
  const t = String(g || "").trim();
  const hit = availableColors_().find((c) => String(c).toLowerCase() === t.toLowerCase());
  return hit || t;
}

function renderFilters() {
  const rebuildHost = document.getElementById("rebuild-filters");
  const rebuildItems = [
    { key: "ALL", label: "Alla" },
    { key: "Ja", label: "Bygg om" },
    { key: "Nej", label: "Aktuella" },
    { key: "EJ", label: "Ej uppsatt" }
  ];
  rebuildHost.innerHTML = rebuildItems.map((it) =>
    `<button type="button" class="chip${rebuildFilter === it.key ? " active" : ""}" data-key="${it.key}" onclick="setRebuildFilter('${it.key}')">${escapeHtml_(it.label)}</button>`
  ).join("");

  const colorHost = document.getElementById("color-filters");
  // Färgraden: hoppa över Ej uppsatt (filtreras via statuschip/statistikbox)
  const colorChips = availableColors_().filter((c) => !isEjUppsattGrade_(c));
  const colors = [{ key: "ALL", label: "Alla färger" }].concat(colorChips.map((c) => ({ key: c, label: c })));
  if (isEjUppsattGrade_(colorFilter)) colorFilter = "ALL";
  colorHost.innerHTML = colors.map((it) =>
    `<button type="button" class="chip${colorFilter === it.key ? " active" : ""}" data-key="${escapeHtml_(it.key)}" onclick="setColorFilter('${escapeHtml_(it.key)}')">${escapeHtml_(it.label)}</button>`
  ).join("");
}
function setRebuildFilter(key) {
  rebuildFilter = key;
  // Ej uppsatt är ingen färg — rensa färgfilter så listan inte blir tom
  if (key === "EJ") colorFilter = "ALL";
  renderFilters();
  filterData();
}
function setColorFilter(key) { colorFilter = key; renderFilters(); filterData(); }

function switchView(view) {
  currentView = view;
  document.getElementById("view-flow").style.display = view === "flow" ? "block" : "none";
  document.getElementById("view-colors").style.display = view === "colors" ? "block" : "none";
  document.getElementById("nav-flow").classList.toggle("active", view === "flow");
  document.getElementById("nav-colors").classList.toggle("active", view === "colors");
  filterData();
}

function getSearchTokens_() {
  return String(document.getElementById("mainSearch").value || "").toLowerCase().trim().split(/\s+/).filter(Boolean);
}
function routeMatches_(r, tokens) {
  if (!tokens.length) return true;
  const hay = [r.Nr, r.Gradering, r.DagsAttByggaOm, r.Ledbyggare, r.Byggdatum, r.Slutdatum, r.Anteckningar].join(" ").toLowerCase();
  return tokens.every((t) => hay.includes(t));
}
function routeMatchesColorFilter_(r) {
  if (colorFilter === "ALL") return true;
  // Vid Ej uppsatt-statusfilter: ignorera färgchip (graderingen är "Ej uppsatt")
  if (rebuildFilter === "EJ") return true;
  return gradeBucketKey_(r) === gradeBucketKey_({ Gradering: colorFilter, Nr: "" });
}
function isEjUppsattRoute_(r) {
  return isEjUppsattGrade_(r && r.Gradering) || isDashStatus_(r && r.DagsAttByggaOm);
}
function routeMatchesRebuildFilter_(r) {
  if (rebuildFilter === "ALL") return true;
  if (rebuildFilter === "EJ") return isEjUppsattRoute_(r);
  // Ja/Nej: räkna inte in Ej uppsatt (status "-")
  if (isEjUppsattRoute_(r)) return false;
  return r.DagsAttByggaOm === rebuildFilter;
}
function visibleRoutes_() {
  const tokens = getSearchTokens_();
  return sortRoutes_(db.routes.filter((r) => {
    if (!isListableRoute_(r)) return false;
    if (!routeMatchesRebuildFilter_(r)) return false;
    if (!routeMatchesColorFilter_(r)) return false;
    return routeMatches_(r, tokens);
  }));
}
function counts_() {
  // Respektera färg + sök (inte statusfilter) så boxarna speglar synligt urval
  const tokens = getSearchTokens_();
  let ja = 0, nej = 0, ej = 0, total = 0;
  db.routes.forEach((r) => {
    if (!isListableRoute_(r)) return;
    if (colorFilter !== "ALL" && gradeBucketKey_(r) !== gradeBucketKey_({ Gradering: colorFilter, Nr: "" })) return;
    if (!routeMatches_(r, tokens)) return;
    total++;
    if (isEjUppsattRoute_(r)) ej++;
    else if (r.DagsAttByggaOm === "Ja") ja++;
    else if (r.DagsAttByggaOm === "Nej") nej++;
  });
  return { ja, nej, ej, total };
}

function filterData() {
  renderFilters();
  const routes = visibleRoutes_();
  if (currentView === "flow") renderFlow(routes);
  else renderColors(routes);
}

function colorDistributionRoutes_() {
  // Fördelning: Grades + Wildcard + Ej uppsatt; sök + ombyggnadsfilter
  const tokens = getSearchTokens_();
  return db.routes.filter((r) => {
    if (!isListableRoute_(r)) return false;
    if (!routeMatchesRebuildFilter_(r)) return false;
    return routeMatches_(r, tokens);
  });
}

function polarToCartesian_(cx, cy, r, angleDeg) {
  const rad = ((angleDeg - 90) * Math.PI) / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function pieSlicePath_(cx, cy, r, startAngle, endAngle) {
  const sweep = endAngle - startAngle;
  if (sweep >= 359.999) {
    // Full circle as two semicircles (SVG arc can't draw full 360 in one go)
    const mid = startAngle + 180;
    const a0 = polarToCartesian_(cx, cy, r, startAngle);
    const a1 = polarToCartesian_(cx, cy, r, mid);
    const a2 = polarToCartesian_(cx, cy, r, startAngle + 360);
    return [
      "M", cx, cy,
      "L", a0.x, a0.y,
      "A", r, r, 0, 1, 1, a1.x, a1.y,
      "A", r, r, 0, 1, 1, a2.x, a2.y,
      "Z"
    ].join(" ");
  }
  const start = polarToCartesian_(cx, cy, r, endAngle);
  const end = polarToCartesian_(cx, cy, r, startAngle);
  const largeArc = sweep > 180 ? 1 : 0;
  return [
    "M", cx, cy,
    "L", start.x, start.y,
    "A", r, r, 0, largeArc, 0, end.x, end.y,
    "Z"
  ].join(" ");
}

function buildColorPieSvg_(slices, total) {
  const cx = 100, cy = 100, r = 78, inner = 44;
  if (!total) {
    return `
      <svg class="color-dist-pie" viewBox="0 0 200 200" role="img" aria-label="Ingen data">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="rgba(255,255,255,0.06)"></circle>
        <circle cx="${cx}" cy="${cy}" r="${inner}" fill="#171b22"></circle>
        <text class="color-dist-center-label" x="${cx}" y="${cy - 2}">0</text>
        <text class="color-dist-center-sub" x="${cx}" y="${cy + 16}">leder</text>
      </svg>`;
  }

  let angle = 0;
  const paths = slices.map((s) => {
    const sweep = (s.count / total) * 360;
    const start = angle;
    const end = angle + sweep;
    angle = end;
    const active = colorFilter === s.name ? " is-active" : "";
    return `<path class="${active.trim()}" d="${pieSlicePath_(cx, cy, r, start, end)}" fill="${s.color}" onclick="setColorFilter('${escapeHtml_(s.name)}')" title="${escapeHtml_(s.name)}: ${s.count}"></path>`;
  }).join("");

  return `
    <svg class="color-dist-pie" viewBox="0 0 200 200" role="img" aria-label="Färgfördelning">
      ${paths}
      <circle cx="${cx}" cy="${cy}" r="${inner}" fill="#171b22"></circle>
      <text class="color-dist-center-label" x="${cx}" y="${cy - 2}">${total}</text>
      <text class="color-dist-center-sub" x="${cx}" y="${cy + 16}">leder</text>
    </svg>`;
}

function renderColors(routes) {
  const distRoutes = colorDistributionRoutes_();
  const byColor = {};
  availableColors_().forEach((c) => { byColor[c] = []; });
  distRoutes.forEach((r) => {
    const key = gradeBucketKey_(r);
    if (!byColor[key]) byColor[key] = [];
    byColor[key].push(r);
  });
  const colors = availableColors_();
  const slices = colors
    .map((c) => ({ name: c, count: (byColor[c] || []).length, color: colorHex_(c) }))
    .filter((s) => s.count > 0);
  const total = distRoutes.length;

  const cardsHtml = colors.map((c) => {
    const n = (byColor[c] || []).length;
    const active = colorFilter === c || (isEjUppsattGrade_(colorFilter) && isEjUppsattGrade_(c)) ? " active" : "";
    return `
      <button type="button" class="color-dist-card${active}" onclick="setColorFilter('${escapeHtml_(c)}')">
        <span class="color-dist-blob" style="background:${colorHex_(c)}"></span>
        <span class="color-dist-count">${n}</span>
        <span class="color-dist-name">${escapeHtml_(c)}</span>
      </button>`;
  }).join("");

  const listColors = colorFilter === "ALL"
    ? colors.filter((c) => (byColor[c] || []).length)
    : colors.filter((c) => {
        if (!(byColor[c] || []).length) return false;
        if (c === colorFilter) return true;
        return isEjUppsattGrade_(colorFilter) && isEjUppsattGrade_(c);
      });

  document.getElementById("view-colors").innerHTML = `
    <div class="hero-line">
      <h1>Färgfördelning</h1>
      <p>Cirkeldiagram per gradering — tryck på en färg för att se alla leder i den färgen.</p>
    </div>
    <div class="color-dist">
      <div class="color-dist-pie-wrap">
        ${buildColorPieSvg_(slices, total)}
        <div class="color-dist-grid">${cardsHtml}</div>
      </div>
    </div>
    ${listColors.length ? listColors.map((c, idx) => {
      const list = sortRoutes_(byColor[c] || []);
      const rebuildN = list.filter((r) => r.DagsAttByggaOm === "Ja").length;
      const activeHead = colorFilter === c || (isEjUppsattGrade_(colorFilter) && isEjUppsattGrade_(c));
      return `
      <div class="color-block" style="animation-delay:${idx * 0.04}s">
        <div class="color-head" onclick="setColorFilter('${escapeHtml_(activeHead && colorFilter !== "ALL" ? "ALL" : c)}')" role="button" tabindex="0">
          <div>
            <h3><span class="color-swatch" style="background:${colorHex_(c)}"></span>${escapeHtml_(c)}</h3>
            <small>${list.length} leder · ${rebuildN} att bygga om</small>
          </div>
          <span style="color:var(--muted)">${activeHead && colorFilter !== "ALL" ? "Visa alla färger" : "Filtrera"}</span>
        </div>
        <div class="route-list">${list.map(routeRowHtml_).join("")}</div>
      </div>`;
    }).join("") : `<div class="empty">Inga leder matchar.</div>`}
  `;
}

/** Ombyggnadsbadge — utelämnas för Ej uppsatt / "-". */
function rebuildBadgeHtml_(r) {
  if (isEjUppsattGrade_(r && r.Gradering)) return "";
  const status = String(r && r.DagsAttByggaOm || "").trim();
  if (!status || status === "-") return "";
  if (status === "Ja") return `<span class="badge-rebuild Ja">Bygg om</span>`;
  if (status === "Nej") return `<span class="badge-rebuild Nej">Aktuell</span>`;
  return "";
}

function routeRowHtml_(r) {

let loginInFlight_ = false;
let loginTimeoutId_ = null;
const LOGIN_TIMEOUT_MS = 25000;

function setLoginFormBusy_(busy) {
  const btn = document.getElementById("login-btn");
  const label = btn && btn.querySelector(".login-btn-label");
  const card = document.querySelector(".login-card");
  const status = document.getElementById("login-status");
  const userEl = document.getElementById("admin-user");
  const pwEl = document.getElementById("admin-pw");
  const rememberEl = document.getElementById("admin-remember-me");
  if (btn) {
    btn.disabled = !!busy;
    btn.classList.toggle("is-loading", !!busy);
    btn.setAttribute("aria-busy", busy ? "true" : "false");
  }
  if (label) label.textContent = busy ? "Loggar in…" : "Logga in";
  if (card) card.classList.toggle("is-busy", !!busy);
  if (status) status.classList.toggle("show", !!busy);
  if (userEl) userEl.disabled = !!busy;
  if (pwEl) pwEl.disabled = !!busy;
  if (rememberEl) rememberEl.disabled = !!busy;
}

function clearLoginTimeout_() {
  if (loginTimeoutId_ != null) {
    clearTimeout(loginTimeoutId_);
    loginTimeoutId_ = null;
  }
}

function endLoginAttempt_(opts) {
  const { error, toast } = opts || {};
  clearLoginTimeout_();
  loginInFlight_ = false;
  setLoginFormBusy_(false);
  if (error) {
    const errEl = document.getElementById("login-error");
    if (errEl) {
      errEl.textContent = typeof error === "string" ? error : "Fel inloggningsuppgifter.";
      errEl.style.display = "block";
    }
  }
  if (toast) showToast(toast);
}

function checkLogin() {
  if (loginInFlight_) return;
  const user = document.getElementById("admin-user").value.trim();
  const pw = document.getElementById("admin-pw").value;
  if (!user || !pw) return;
  const remember = !!document.getElementById("admin-remember-me").checked;
  document.getElementById("login-error").style.display = "none";
  document.getElementById("login-error").textContent = "Fel inloggningsuppgifter.";
  loginInFlight_ = true;
  setLoginFormBusy_(true);
  clearLoginTimeout_();
  loginTimeoutId_ = setTimeout(() => {
    if (!loginInFlight_) return;
    endLoginAttempt_({
      error: "Inget svar från servern. Kontrollera nätverket och försök igen.",
      toast: "Inloggningen tog för lång tid"
    });
  }, LOGIN_TIMEOUT_MS);

  google.script.run
    .withSuccessHandler((res) => {
      if (!loginInFlight_) return; // timeout har redan låst upp
      if (!res || !res.authorized) {
        endLoginAttempt_({ error: true });
        return;
      }
      currentUser = {
        authorized: true,
        role: res.role || "admin",
        username: res.username || user,
        name: res.name || "",
        firstLogin: !!res.firstLogin
      };
      if (remember) setRememberedAdminUsername(user);
      else setRememberedAdminUsername("");
      saveSession_(remember);

      clearLoginTimeout_();
      loginInFlight_ = false;
      setLoginFormBusy_(false);

        error: "Kunde inte nå servern. Försök igen.",
        toast: "Anslutningen misslyckades"
      });
    })
    .verifyAdminPassword(user, pw);
}

function plockaNerLed() {
  const grad = document.getElementById("f-grad");
  const setter = document.getElementById("f-setter");
  const build = document.getElementById("f-build");
  const notes = document.getElementById("f-notes");

  const hasOpt = Array.from(grad.options).some((o) => String(o.value).toLowerCase() === EJ_UPPSATT_GRADE.toLowerCase());
  if (!hasOpt) {
    const opt = document.createElement("option");

function routeImageSrc_(bild, size) {
  const b = String(bild || "").trim();
  if (!b) return "";
  if (b.startsWith("http") || b.startsWith("data:")) return b;
  const px = Math.max(100, Math.min(2048, Number(size) || 800));
  return "https://lh3.googleusercontent.com/d/" + encodeURIComponent(b) + "=s" + px;
}

function toggleRouteImageLightbox_(src) {

function closeRouteImageLightbox_() {

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeRouteImageLightbox_();

/* ---------- Bildredigerare: foto → helskärmsmarkering → förhandsvisning ---------- */
let routeImgEditor_ = null;
let imgMarkBound_ = false;

function setImgEditorStatus_(msg) {
  const el = document.getElementById("img-editor-status");
  if (el) el.textContent = msg || "";
}

function updateRouteImagePreviewUI_(src) {
  const empty = document.getElementById("img-editor-empty");
  const wrap = document.getElementById("img-editor-preview-wrap");
  const preview = document.getElementById("img-editor-preview");
  const markBtn = document.getElementById("img-mark-btn");
  const removeBtn = document.getElementById("img-remove");
  const has = !!src;
  if (empty) empty.style.display = has ? "none" : "";
  if (wrap) wrap.style.display = has ? "" : "none";
  if (preview) preview.src = has ? src : "";
  if (markBtn) markBtn.style.display = has ? "" : "none";
  if (removeBtn) removeBtn.style.display = has ? "" : "none";
}

function bindRouteImageEditor_(existingBild) {
  const existing = String(existingBild || "").trim();
  routeImgEditor_ = {
    img: null,
    strokes: [],
    drawing: false,
    dirty: false,
    existingId: existing,
    committedDataUrl: "",
    draftImg: null,
    draftStrokes: [],
    open: false,
    snapshot: null
  };
  ensureImgMarkCanvasBound_();

  const fileInput = document.getElementById("f-img-file");
  if (fileInput) {
    fileInput.onchange = () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => openRouteImageMark_(String(reader.result || ""), { replacePhoto: true });
      reader.readAsDataURL(file);
      fileInput.value = "";
    };
  }

  if (existing) {
    updateRouteImagePreviewUI_(routeImageSrc_(existing));
    setImgEditorStatus_("Tryck Markera led för att rita, eller ta nytt foto.");
  } else {
    updateRouteImagePreviewUI_("");
    setImgEditorStatus_("");
  }
}

function ensureImgMarkCanvasBound_() {
  if (imgMarkBound_) return;
  const canvas = document.getElementById("img-mark-canvas");
  if (!canvas) return;
  imgMarkBound_ = true;

  const getPos_ = (e) => {
    const rect = canvas.getBoundingClientRect();
    if (!rect.width || !rect.height) return { x: 0, y: 0 };
    const src = e.touches && e.touches[0] ? e.touches[0] : e;
    const x = ((src.clientX - rect.left) / rect.width) * canvas.width;
    const y = ((src.clientY - rect.top) / rect.height) * canvas.height;
    return { x, y };
  };

  const onStart = (e) => {
    if (!routeImgEditor_ || !routeImgEditor_.open || !routeImgEditor_.draftImg) return;
    e.preventDefault();
    routeImgEditor_.drawing = true;
    routeImgEditor_.draftStrokes.push([getPos_(e)]);
    redrawRouteImageCanvas_();
  };
  const onMove = (e) => {
    if (!routeImgEditor_ || !routeImgEditor_.drawing) return;
    e.preventDefault();
    const stroke = routeImgEditor_.draftStrokes[routeImgEditor_.draftStrokes.length - 1];
    if (!stroke) return;
    stroke.push(getPos_(e));
    redrawRouteImageCanvas_();
  };
  const onEnd = (e) => {
    if (!routeImgEditor_) return;
    if (e) e.preventDefault();
    routeImgEditor_.drawing = false;
  };

  canvas.addEventListener("mousedown", onStart);
  canvas.addEventListener("mousemove", onMove);
  canvas.addEventListener("mouseup", onEnd);
  canvas.addEventListener("mouseleave", onEnd);
  canvas.addEventListener("touchstart", onStart, { passive: false });
  canvas.addEventListener("touchmove", onMove, { passive: false });
  canvas.addEventListener("touchend", onEnd, { passive: false });

  window.addEventListener("resize", () => {
    if (routeImgEditor_ && routeImgEditor_.open) fitRouteImageCanvas_();
  });
}

function snapshotRouteImageEditor_() {
  const ed = routeImgEditor_;
  if (!ed) return null;
  const hid = document.getElementById("f-img");
  return {
    img: ed.img,
    strokes: ed.strokes,
    dirty: ed.dirty,
    existingId: ed.existingId,
    committedDataUrl: ed.committedDataUrl,
    hidValue: hid ? hid.value : ""
  };
}

function restoreRouteImageSnapshot_(snap) {
  if (!routeImgEditor_ || !snap) return;
  routeImgEditor_.img = snap.img;
  routeImgEditor_.strokes = snap.strokes || [];
  routeImgEditor_.dirty = !!snap.dirty;
  routeImgEditor_.existingId = snap.existingId || "";
  routeImgEditor_.committedDataUrl = snap.committedDataUrl || "";
  const hid = document.getElementById("f-img");
  if (hid) hid.value = snap.hidValue || "";
  const previewSrc = snap.committedDataUrl || (snap.existingId ? routeImageSrc_(snap.existingId) : "") || (hid && hid.value ? routeImageSrc_(hid.value) : "");
  updateRouteImagePreviewUI_(previewSrc);
}

function openRouteImageMark_(src, opts) {
  opts = opts || {};
  if (!src || !routeImgEditor_) return;
  ensureImgMarkCanvasBound_();
  routeImgEditor_.snapshot = snapshotRouteImageEditor_();
  routeImgEditor_.draftStrokes = [];
  routeImgEditor_.drawing = false;

  const image = new Image();
  if (!String(src).startsWith("data:")) image.crossOrigin = "anonymous";
  image.onload = () => {
    routeImgEditor_.draftImg = image;
    if (opts.replacePhoto) {
      // Nytt foto ersätter tidigare bild när användaren trycker Klar
      const hid = document.getElementById("f-img");
      if (hid) hid.value = "";
    }
    showRouteImageMarkOverlay_();
    fitRouteImageCanvas_();
    redrawRouteImageCanvas_();
    setImgEditorStatus_("Markera leden, tryck sedan Klar.");
  };
  image.onerror = () => {
    routeImgEditor_.snapshot = null;
    setImgEditorStatus_("Kunde inte läsa bilden.");
    showToast("Kunde inte öppna bilden");
  };
  image.src = src;
}

function reopenRouteImageMark_() {
  if (!routeImgEditor_) return;
  const src = routeImgEditor_.committedDataUrl
    || (routeImgEditor_.existingId ? routeImageSrc_(routeImgEditor_.existingId) : "")
    || (document.getElementById("f-img") && document.getElementById("f-img").value
      ? routeImageSrc_(document.getElementById("f-img").value)
      : "");
  if (!src) {
    showToast("Ingen bild att markera — ta foto först");
    return;
  }
  openRouteImageMark_(src, { replacePhoto: false });
}

function showRouteImageMarkOverlay_() {
  const overlay = document.getElementById("img-mark-overlay");
  if (!overlay || !routeImgEditor_) return;
  routeImgEditor_.open = true;
  overlay.classList.add("open");
  overlay.setAttribute("aria-hidden", "false");
  document.body.classList.add("img-mark-open");
  // Fit after layout
  requestAnimationFrame(() => {
    fitRouteImageCanvas_();
    redrawRouteImageCanvas_();
  });
}

function hideRouteImageMarkOverlay_() {
  const overlay = document.getElementById("img-mark-overlay");
  if (routeImgEditor_) {
    routeImgEditor_.open = false;
    routeImgEditor_.drawing = false;
    routeImgEditor_.draftImg = null;
    routeImgEditor_.draftStrokes = [];
    routeImgEditor_.snapshot = null;
  }
  if (overlay) {
    overlay.classList.remove("open");
    overlay.setAttribute("aria-hidden", "true");
  }
  document.body.classList.remove("img-mark-open");
}

function fitRouteImageCanvas_() {
  const canvas = document.getElementById("img-mark-canvas");
  const stage = document.getElementById("img-mark-stage");
  const img = routeImgEditor_ && routeImgEditor_.draftImg;
  if (!canvas || !img) return;

  const maxPx = 1400;
  const iscale = Math.min(1, maxPx / Math.max(1, img.naturalWidth));
  canvas.width = Math.max(1, Math.round(img.naturalWidth * iscale));
  canvas.height = Math.max(1, Math.round(img.naturalHeight * iscale));

  if (stage) {
    const maxW = Math.max(1, stage.clientWidth - 4);
    const maxH = Math.max(1, stage.clientHeight - 4);
    const dscale = Math.min(maxW / canvas.width, maxH / canvas.height);
    canvas.style.width = Math.max(1, Math.floor(canvas.width * dscale)) + "px";
    canvas.style.height = Math.max(1, Math.floor(canvas.height * dscale)) + "px";
  }
}

function redrawRouteImageCanvas_() {
  const canvas = document.getElementById("img-mark-canvas");
  const ed = routeImgEditor_;
  if (!canvas || !ed || !ed.draftImg) return;
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(ed.draftImg, 0, 0, canvas.width, canvas.height);
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.strokeStyle = "#ff4d4d";
  ctx.lineWidth = Math.max(4, canvas.width * 0.008);
  (ed.draftStrokes || []).forEach((stroke) => {
    if (!stroke || stroke.length < 2) return;
    ctx.beginPath();
    ctx.moveTo(stroke[0].x, stroke[0].y);
    for (let i = 1; i < stroke.length; i++) ctx.lineTo(stroke[i].x, stroke[i].y);
    ctx.stroke();
  });
}

function clearRouteImageStrokes_() {
  if (!routeImgEditor_ || !routeImgEditor_.open) return;
  routeImgEditor_.draftStrokes = [];
  redrawRouteImageCanvas_();
}

function confirmRouteImageMark_() {
  if (!routeImgEditor_ || !routeImgEditor_.open || !routeImgEditor_.draftImg) return;
  const canvas = document.getElementById("img-mark-canvas");
  if (!canvas) return;
  let dataUrl = "";
  try {
    dataUrl = canvas.toDataURL("image/jpeg", 0.82);
  } catch (e) {
    showToast("Kunde inte spara markeringen. Ta om fotot och markera igen.");
    return;
  }
  if (!dataUrl) {
    showToast("Kunde inte spara markeringen");
    return;
  }
  routeImgEditor_.committedDataUrl = dataUrl;
  routeImgEditor_.img = routeImgEditor_.draftImg;
  routeImgEditor_.strokes = [];
  routeImgEditor_.dirty = true;
  routeImgEditor_.existingId = "";
  const hid = document.getElementById("f-img");
  if (hid) hid.value = "";
  updateRouteImagePreviewUI_(dataUrl);
  hideRouteImageMarkOverlay_();
  setImgEditorStatus_("Markering klar — spara leden för att ladda upp.");
}

function cancelRouteImageMark_() {
  if (!routeImgEditor_) return;
  const snap = routeImgEditor_.snapshot;
  hideRouteImageMarkOverlay_();
  if (snap) restoreRouteImageSnapshot_(snap);
  setImgEditorStatus_(snap && (snap.committedDataUrl || snap.existingId || snap.hidValue)
    ? "Markering avbruten."
    : "");
}

function clearRouteImage_() {
  if (routeImgEditor_ && routeImgEditor_.open) hideRouteImageMarkOverlay_();
  routeImgEditor_ = {
    img: null,
    strokes: [],
    drawing: false,
    dirty: true,
    existingId: "",
    committedDataUrl: "",
    draftImg: null,
    draftStrokes: [],
    open: false,
    snapshot: null
  };
  const hid = document.getElementById("f-img");
  if (hid) hid.value = "";
  updateRouteImagePreviewUI_("");
  setImgEditorStatus_("Bild borttagen — spara för att uppdatera leden.");
}

function exportRouteImageDataUrl_() {
  if (!routeImgEditor_) return "";
  if (routeImgEditor_.committedDataUrl) return routeImgEditor_.committedDataUrl;
  return "";
}

function isDriveFileId_(id) {
  const s = String(id || "").trim();
  if (!s || /^https?:/i.test(s) || /^data:/i.test(s)) return false;
  return /^[a-zA-Z0-9_-]{20,}$/.test(s);
}

function deleteRouteImageOnServer_(nr, fileId) {
  return new Promise((resolve) => {
    if (!nr && !isDriveFileId_(fileId)) {
      resolve();
      return;
    }
    google.script.run
      .withSuccessHandler(() => resolve())
      .withFailureHandler(() => resolve()) // rensning får inte blockera sparning
      .deleteRouteImage({ nr: nr || "", fileId: fileId || "" });
  });
}

function uploadRouteImageIfNeeded_(nr) {
  return new Promise((resolve, reject) => {
    const ed = routeImgEditor_;
    const hid = document.getElementById("f-img");
    const prevEl = document.getElementById("f-img-prev");
    const current = hid ? hid.value.trim() : "";
    const previousId = prevEl ? prevEl.value.trim() : (ed && ed.existingId) || "";

    if (!ed || !ed.dirty) {
      resolve(current);
      return;
    }

    // Bild borttagen — rensa Drive och returnera tomt
    if (!ed.committedDataUrl && !ed.img) {
      deleteRouteImageOnServer_(nr, previousId).then(() => {
        if (hid) hid.value = "";
        if (prevEl) prevEl.value = "";
        resolve("");
      });
      return;
    }

    const dataUrl = exportRouteImageDataUrl_();
    if (!dataUrl) {
      reject(new Error("Kunde inte exportera bilden. Ta om fotot om du vill rita på en befintlig Drive-bild."));
      return;
    }
    setImgEditorStatus_("Laddar upp bild till Drive…");
    const saveBtn = document.getElementById("save-route-btn");
    if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = "Laddar upp bild…"; }
    google.script.run
      .withSuccessHandler((res) => {
        if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = "Spara led"; }
        if (!res || res.ok === false) {
          setImgEditorStatus_((res && res.error) || "Uppladdning misslyckades");
          reject(new Error((res && res.error) || "Uppladdning misslyckades"));
          return;
        }
        const id = String(res.fileId || "").trim();
        if (hid) hid.value = id;
        if (prevEl) prevEl.value = id;
        if (routeImgEditor_) {
          routeImgEditor_.dirty = false;
          routeImgEditor_.existingId = id;
          routeImgEditor_.committedDataUrl = "";
        }
        updateRouteImagePreviewUI_(routeImageSrc_(id) || dataUrl);
        setImgEditorStatus_("Bild uppladdad (ersatte eventuell gammal).");
        resolve(id);
      })
      .withFailureHandler((err) => {
        if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = "Spara led"; }
        setImgEditorStatus_("Kunde inte ladda upp bilden.");
        reject(err || new Error("Uppladdning misslyckades"));
      })
      .uploadRouteImage({
        dataBase64: dataUrl,
        mimeType: "image/jpeg",
        nr: nr || "",
        previousFileId: previousId
      });
  });
}

function persistRouteOnServer_(route) {
  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler((res) => {
        if (!res || res.ok === false) reject(new Error((res && res.error) || "Kunde inte spara"));
        else resolve(res);
      })
      .withFailureHandler(() => reject(new Error("Kunde inte spara")))
      .saveRoute(route);
  });
}

function saveRoute(existingNr) {
  if (!canEditContentRole()) return showToast("Saknar behörighet");
  const nrVal = document.getElementById("f-nr").value.trim() || existingNr || "";
  const route = {
    Nr: nrVal,
    Gradering: document.getElementById("f-grad").value,
    Ledbyggare: document.getElementById("f-setter").value.trim(),
    Byggdatum: document.getElementById("f-build").value,
    Anteckningar: document.getElementById("f-notes").value.trim(),
    Bild: document.getElementById("f-img").value.trim()
  };
  if (!isListableGrade_(route.Gradering)) {
    return showToast("Välj en giltig gradering");
  }
  const exists = route.Nr && db.routes.some((r) => String(r.Nr) === String(route.Nr));
  if ((!route.Nr || !exists) && !canManageRouteStructureRole()) {
    return showToast("Bara superadmin kan lägga till leder");
  }

  const saveBtn = document.getElementById("save-route-btn");
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = "Sparar…"; }

  const ed = routeImgEditor_;
  const needsImageWork = !!(ed && ed.dirty && (ed.committedDataUrl || ed.img || !route.Bild));
  // Ny led utan Nr: spara först så filen kan heta led-{nr}.jpg (en bild per led)
  const ensureNr = (!route.Nr && needsImageWork)
    ? persistRouteOnServer_(Object.assign({}, route, { Bild: "" })).then((res) => {
        const nr = String((res.route && res.route.Nr) || "").trim();
        if (!nr) throw new Error("Kunde inte tilldela lednummer");
        route.Nr = nr;
        const nrEl = document.getElementById("f-nr");
        if (nrEl) nrEl.value = nr;
        const shell = normalizeRoute_((res && res.route) || route);
        const i = db.routes.findIndex((x) => String(x.Nr) === nr);
        if (i >= 0) db.routes[i] = shell;
        else db.routes.push(shell);
        return nr;
      })
    : Promise.resolve(route.Nr);

  ensureNr
    .then((nr) => uploadRouteImageIfNeeded_(nr || route.Nr))
    .then((bildId) => {
      route.Bild = bildId || "";
      return persistRouteOnServer_(route);
    })
    .then((res) => {
      const saved = normalizeRoute_((res && res.route) || route);
      const i = db.routes.findIndex((x) => String(x.Nr) === String(saved.Nr));
      if (i >= 0) db.routes[i] = saved;
      else if (canManageRouteStructureRole()) db.routes.push(saved);
      showToast("Led sparad");
      closePanel();
      filterData();
    })
    .catch((err) => {
      showToast((err && err.message) || "Kunde inte spara");
      if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = "Spara led"; }
    });
}

function deleteRoute(nr) {
  if (!canManageRouteStructureRole()) return showToast("Bara superadmin kan ta bort leder");
  if (!confirm("Radera led " + nr + " från sheetet?")) return;
  google.script.run
    .withSuccessHandler((res) => {
      if (!res || res.ok === false) return showToast((res && res.error) || "Kunde inte radera");
      db.routes = db.routes.filter((r) => String(r.Nr) !== String(nr));
      showToast("Led raderad");
      closePanel();
      filterData();
    })
    .deleteRoute(nr);
}

      <button class="btn btn-accent w-100" type="button" onclick="changePassword()">Spara</button>

function changePassword() {
  const oldPw = document.getElementById("pw-old").value;
  const newPw = document.getElementById("pw-new").value;
  if (!newPw || newPw.length < 6) return showToast("Nytt lösenord för kort");
  google.script.run
    .withSuccessHandler((res) => {
      if (!res || res.ok === false) return showToast((res && res.error) || "Kunde inte byta");
      showToast("Lösenord uppdaterat");
      renderSettingsHome();
    })
    .changeOwnPassword(oldPw, newPw);
}

  document.getElementById("admin-main").innerHTML = `
    <div class="admin-card">
      <button class="btn btn-sm btn-ghost mb-3" type="button" onclick="renderSettingsHome()">← Tillbaka</button>

      <p class="small mb-3" style="color:var(--muted);">Skapa nya konton. Vid första inloggning uppmanas användaren att byta lösenord.</p>
      <div class="row g-2 mb-3">
        <div class="col-6">
          <label class="form-label" for="nu-user">Användarnamn</label>
          <input id="nu-user" class="form-control form-control-sm" placeholder="t.ex. jesper" autocomplete="off">
        </div>
        <div class="col-6">
          <label class="form-label" for="nu-name">Namn</label>
          <input id="nu-name" class="form-control form-control-sm" placeholder="För- och efternamn" autocomplete="off">
        </div>
        <div class="col-6">
          <label class="form-label" for="nu-role">Roll</label>
          <select id="nu-role" class="form-select form-select-sm">
            <option value="admin">Admin</option>
            <option value="scout">Sättare</option>
            <option value="superadmin">Superadmin</option>
          </select>
        </div>
        <div class="col-6">
          <label class="form-label" for="nu-pw">Tillfälligt lösenord</label>
          <input id="nu-pw" class="form-control form-control-sm" placeholder="Temp-lösenord" value="changeme" autocomplete="new-password">
        </div>
      </div>
      <button class="btn btn-accent btn-sm mb-3" type="button" onclick="createUser()">Skapa användare</button>
      <div id="admin-user-list">Laddar…</div>
    </div>`;
  google.script.run
    .withSuccessHandler((users) => {
      const host = document.getElementById("admin-user-list");
      if (!host) return;
      host.innerHTML = (users || []).map((u) => `
        <div class="d-flex justify-content-between align-items-center py-2 border-bottom" style="border-color:var(--line)!important; gap:8px;">
          <div>
            <strong>${escapeHtml_(u.username)}</strong>
            <div class="small" style="color:var(--muted);">${escapeHtml_(u.name || "")}</div>
          </div>
          <div class="d-flex gap-2 align-items-center">
            <select class="form-select form-select-sm" style="width:auto;" onchange="updateRole('${escapeHtml_(u.username)}', this.value)">
              <option value="scout" ${u.role === "scout" ? "selected" : ""}>Sättare</option>
              <option value="admin" ${u.role === "admin" ? "selected" : ""}>Admin</option>
              <option value="superadmin" ${u.role === "superadmin" ? "selected" : ""}>Superadmin</option>
            </select>
            <button class="btn btn-sm btn-outline-danger" type="button" onclick="deleteUser('${escapeHtml_(u.username)}')">Radera</button>
          </div>
        </div>
      `).join("") || `<div class="empty">Inga användare.</div>`;
    })
    .getAllAdmins();
}

function createUser() {
  const payload = {
    username: document.getElementById("nu-user").value.trim(),
    name: document.getElementById("nu-name").value.trim(),
    role: document.getElementById("nu-role").value,
    password: document.getElementById("nu-pw").value
  };
  if (!payload.username) return showToast("Användarnamn saknas");
  google.script.run
    .withSuccessHandler((res) => {
      if (!res || res.ok === false) return showToast((res && res.error) || "Kunde inte skapa");
      showToast("Användare skapad");
      renderUserManagement();
    })
    .createNewAdmin(payload);
}
function updateRole(username, role) {
  google.script.run
    .withSuccessHandler((res) => {
      if (!res || res.ok === false) return showToast((res && res.error) || "Kunde inte uppdatera");
      showToast("Roll uppdaterad");
    })
    .updateUserRole(username, role);
}
function deleteUser(username) {
  if (!confirm("Radera användare " + username + "?")) return;
  google.script.run
    .withSuccessHandler((res) => {
      if (!res || res.ok === false) return showToast((res && res.error) || "Kunde inte radera");
      showToast("Användare raderad");
      renderUserManagement();
    })
    .deleteUserAction(username);
}
