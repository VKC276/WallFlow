<!DOCTYPE html>
<html lang="sv">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#12151a">
  <meta name="description" content="WallFlow — följ ledbyggnationen i klätterhallen.">
  <title>WallFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --bg: #12151a;
      --bg-elev: #1a1f27;
      --bg-soft: #222833;
      --line: rgba(255, 255, 255, 0.08);
      --text: #f2efe8;
      --muted: #9aa3b2;
      --accent: #e8a54b;
      --accent-2: #6ec8b0;
      --danger: #e35d6a;
      --status-planerad: #7a8494;
      --status-satts: #e8a54b;
      --status-aktiv: #6ec8b0;
      --status-strippas: #d67b5c;
      --status-arkiverad: #555e6b;
      --search-h: 52px;
      --nav-h: 64px;
      --radius: 18px;
      --font-display: "Syne", sans-serif;
      --font-body: "Figtree", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: var(--font-body);
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(232, 165, 75, 0.16), transparent 55%),
        radial-gradient(900px 500px at 100% 0%, rgba(110, 200, 176, 0.12), transparent 50%),
        linear-gradient(180deg, #161a21 0%, var(--bg) 40%, #0e1116 100%);
      overflow: hidden;
    }

    #loading-screen {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #0e1116;
      transition: opacity .45s ease, visibility .45s ease;
    }
    #loading-screen.hide { opacity: 0; visibility: hidden; pointer-events: none; }
    .brand-mark {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(2.6rem, 10vw, 3.6rem);
      letter-spacing: -0.04em;
      line-height: 0.95;
      margin: 0;
      background: linear-gradient(120deg, #fff 10%, var(--accent) 55%, var(--accent-2) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: brandIn .8s ease both;
    }
    .brand-sub {
      margin-top: 10px;
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 0.72rem;
      animation: brandIn .8s ease .12s both;
    }
    .loader-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      margin-top: 28px;
      animation: pulseDot 1.1s ease-in-out infinite;
    }
    @keyframes brandIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: none; }
    }
    @keyframes pulseDot {
      0%, 100% { transform: scale(1); opacity: .55; }
      50% { transform: scale(1.35); opacity: 1; }
    }
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: none; }
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateX(8px); }
      to { opacity: 1; transform: none; }
    }

    #app-public {
      display: flex; flex-direction: column;
      height: 100%; min-height: 100dvh;
      position: relative;
    }

    .topbar {
      position: sticky; top: 0; z-index: 30;
      padding: calc(12px + var(--safe-top)) 16px 10px;
      background: linear-gradient(180deg, rgba(18,21,26,.96), rgba(18,21,26,.82) 70%, transparent);
      backdrop-filter: blur(10px);
    }
    .topbar-row {
      display: flex; align-items: center; gap: 12px;
    }
    .top-brand {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.35rem;
      letter-spacing: -0.03em;
      flex: 0 0 auto;
    }
    .top-brand span { color: var(--accent); }
    .search-wrap {
      flex: 1; min-width: 0;
      display: flex; align-items: center; gap: 8px;
      height: var(--search-h);
      padding: 0 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
    }
    .search-wrap input {
      flex: 1; min-width: 0;
      border: 0; outline: 0; background: transparent;
      color: var(--text); font-size: 0.95rem;
    }
    .search-wrap input::placeholder { color: #6f7888; }
    .icon-btn {
      border: 0; background: transparent; color: var(--muted);
      width: 36px; height: 36px; border-radius: 10px;
      display: grid; place-items: center; cursor: pointer;
    }
    .icon-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }

    .filter-row {
      display: flex; gap: 8px; overflow-x: auto;
      padding: 10px 16px 4px;
      scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--muted);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, color .2s, border-color .2s, transform .2s;
    }
    .chip:hover { transform: translateY(-1px); }
    .chip.active {
      color: #12151a;
      background: var(--accent);
      border-color: transparent;
    }
    .chip[data-status="SATTS"].active { background: var(--status-satts); }
    .chip[data-status="AKTIV"].active { background: var(--status-aktiv); }
    .chip[data-status="STRIPPAS"].active { background: var(--status-strippas); }
    .chip[data-status="PLANERAD"].active { background: #a8b0bd; }

    .scroll-area {
      flex: 1; min-height: 0;
      overflow-y: auto;
      padding: 8px 16px calc(98px + var(--safe-bottom));
    }

    .hero-line {
      margin: 8px 0 18px;
      animation: riseIn .5s ease both;
    }
    .hero-line h1 {
      font-family: var(--font-display);
      font-size: clamp(1.7rem, 5.5vw, 2.2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin: 0 0 6px;
      line-height: 1.1;
    }
    .hero-line p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 36ch;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
      animation: riseIn .55s ease .05s both;
    }
    .stat {
      padding: 14px 12px;
      border-radius: 16px;
      background: linear-gradient(160deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      border: 1px solid var(--line);
    }
    .stat strong {
      display: block;
      font-family: var(--font-display);
      font-size: 1.45rem;
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat span { color: var(--muted); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }

    .section-label {
      display: flex; align-items: baseline; justify-content: space-between;
      margin: 18px 0 10px;
      animation: riseIn .45s ease both;
    }
    .section-label h2 {
      font-family: var(--font-display);
      font-size: 1.05rem;
      margin: 0;
      letter-spacing: -0.02em;
    }
    .section-label span { color: var(--muted); font-size: 0.8rem; }

    .wall-block {
      margin-bottom: 14px;
      border-radius: var(--radius);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
      overflow: hidden;
      animation: riseIn .5s ease both;
    }
    .wall-head {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 14px 14px 10px;
      cursor: pointer;
    }
    .wall-head h3 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 1.05rem;
      letter-spacing: -0.02em;
    }
    .wall-head small { color: var(--muted); }
    .wall-routes { padding: 0 10px 10px; display: grid; gap: 8px; }

    .route-row {
      display: grid;
      grid-template-columns: 10px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border-radius: 14px;
      background: rgba(0,0,0,0.22);
      border: 1px solid transparent;
      cursor: pointer;
      transition: border-color .2s, transform .2s, background .2s;
      animation: fadeSlide .35s ease both;
    }
    .route-row:hover {
      border-color: rgba(232,165,75,0.35);
      transform: translateX(2px);
      background: rgba(0,0,0,0.32);
    }
    .route-dot {
      width: 10px; height: 10px; border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
    }
    .route-main { min-width: 0; }
    .route-main strong {
      display: block;
      font-size: 0.95rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .route-main span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .route-meta {
      text-align: right;
      font-size: 0.78rem;
      font-weight: 700;
    }
    .badge-status {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #12151a;
    }
    .badge-status.PLANERAD { background: #a8b0bd; }
    .badge-status.SATTS { background: var(--status-satts); }
    .badge-status.AKTIV { background: var(--status-aktiv); }
    .badge-status.STRIPPAS { background: var(--status-strippas); }
    .badge-status.ARKIVERAD { background: var(--status-arkiverad); color: #ddd; }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 40px 16px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
    }

    .modern-nav {
      position: fixed;
      left: 50%;
      bottom: calc(18px + var(--safe-bottom));
      transform: translateX(-50%);
      width: min(420px, calc(100% - 24px));
      height: var(--nav-h);
      display: flex;
      gap: 6px;
      padding: 6px;
      border-radius: 999px;
      background: rgba(20, 24, 31, 0.88);
      border: 1px solid var(--line);
      backdrop-filter: blur(14px);
      z-index: 40;
      box-shadow: 0 16px 40px rgba(0,0,0,0.35);
    }
    .nav-item {
      flex: 1;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      border-radius: 999px;
      color: var(--muted);
      cursor: pointer;
      font-weight: 700;
      font-size: 0.82rem;
      transition: all .25s ease;
    }
    .nav-item.active {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
    }

    #panel {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      max-height: min(82vh, 720px);
      background: #171b22;
      border-radius: 22px 22px 0 0;
      border: 1px solid var(--line);
      border-bottom: 0;
      z-index: 50;
      transform: translateY(110%);
      transition: transform .35s cubic-bezier(.2,.8,.2,1);
      display: flex; flex-direction: column;
      box-shadow: 0 -20px 60px rgba(0,0,0,0.45);
    }
    #panel.open { transform: translateY(0); }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 16px 8px;
      border-bottom: 1px solid var(--line);
    }
    .panel-header h5 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 1.2rem;
      letter-spacing: -0.02em;
    }
    #panel-body {
      overflow-y: auto;
      padding: 14px 16px calc(24px + var(--safe-bottom));
    }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 12px 0 16px;
    }
    .detail-cell {
      padding: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
    }
    .detail-cell label {
      display: block;
      color: var(--muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .detail-cell strong { font-size: 0.95rem; }

    #login-panel, #app-admin {
      position: fixed; inset: 0; z-index: 80;
      background: #10141a;
      display: none;
      flex-direction: column;
    }
    #login-panel.show, #app-admin.show { display: flex; }
    .login-inner {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .login-card { width: min(360px, 100%); }
    .login-card h2 {
      font-family: var(--font-display);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin: 0 0 6px;
    }
    .form-control, .form-select {
      background: rgba(255,255,255,0.04) !important;
      border: 1px solid var(--line) !important;
      color: var(--text) !important;
      border-radius: 12px !important;
    }
    .form-control:focus, .form-select:focus {
      border-color: rgba(232,165,75,0.55) !important;
      box-shadow: 0 0 0 3px rgba(232,165,75,0.15) !important;
    }
    .btn-accent {
      background: var(--accent);
      border: 0;
      color: #12151a;
      font-weight: 700;
      border-radius: 12px;
    }
    .btn-accent:hover { filter: brightness(1.05); color: #12151a; }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 12px;
    }
    .admin-shell {
      max-width: 820px;
      margin: 0 auto;
      width: 100%;
      padding: 16px 16px calc(40px + var(--safe-bottom));
      overflow-y: auto;
      flex: 1;
    }
    .admin-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .admin-card h3, .admin-card h4 {
      font-family: var(--font-display);
      letter-spacing: -0.02em;
      margin: 0 0 10px;
    }
    .toast-wrap {
      position: fixed;
      left: 50%;
      bottom: calc(92px + var(--safe-bottom));
      transform: translateX(-50%);
      z-index: 100;
      pointer-events: none;
    }
    .toast-msg {
      background: #243041;
      border: 1px solid var(--line);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.88rem;
      opacity: 0;
      transition: opacity .25s;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    .toast-msg.show { opacity: 1; }
    .demo-banner {
      margin: 0 16px 10px;
      padding: 8px 12px;
      border-radius: 12px;
      background: rgba(232,165,75,0.12);
      border: 1px solid rgba(232,165,75,0.28);
      color: #f0d2a4;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .color-swatch {
      width: 14px; height: 14px; border-radius: 50%;
      display: inline-block; vertical-align: -2px;
      margin-right: 6px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <h1 class="brand-mark">WallFlow</h1>
    <div class="brand-sub">Ledbyggnation</div>
    <div class="loader-dot" aria-hidden="true"></div>
  </div>

  <div id="app-public">
    <div class="topbar">
      <div class="topbar-row">
        <div class="top-brand">Wall<span>Flow</span></div>
        <div class="search-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
          <input id="mainSearch" type="search" placeholder="Sök led, vägg, grad, sättare…" oninput="filterData()" autocomplete="off">
          <button class="icon-btn" type="button" onclick="document.getElementById('mainSearch').value=''; filterData();" aria-label="Rensa sök">✕</button>
          <button class="icon-btn" type="button" onclick="toggleAdmin(true)" aria-label="Admin">⚙</button>
        </div>
      </div>
    </div>

    <div id="demo-banner" class="demo-banner" style="display:none;">
      Demoläge — data sparas lokalt. Logga in med <code>admin</code> / <code>wallflow</code>.
    </div>

    <div class="filter-row" id="status-filters" aria-label="Statusfilter"></div>

    <div class="scroll-area" id="main-scroll">
      <div id="view-flow"></div>
      <div id="view-walls" style="display:none;"></div>
    </div>

    <nav class="modern-nav" aria-label="Vy">
      <div id="nav-flow" class="nav-item active" onclick="switchView('flow')" role="button" tabindex="0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h10M4 12h16M4 18h8"/></svg>
        <span>Flöde</span>
      </div>
      <div id="nav-walls" class="nav-item" onclick="switchView('walls')" role="button" tabindex="0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18M9 4v16"/></svg>
        <span>Väggar</span>
      </div>
    </nav>
  </div>

  <div id="panel">
    <div class="panel-header">
      <h5 id="panel-title"></h5>
      <button class="icon-btn" type="button" onclick="closePanel()" aria-label="Stäng">✕</button>
    </div>
    <div id="panel-body"></div>
  </div>

  <div id="login-panel">
    <div class="p-3 d-flex justify-content-between align-items-center border-bottom" style="border-color: var(--line) !important;">
      <button class="btn btn-sm btn-ghost" type="button" onclick="closeLoginPanel()">Avbryt</button>
      <span class="text-uppercase small" style="color:var(--muted); letter-spacing:.08em;">Workbench</span>
      <span style="width:64px;"></span>
    </div>
    <div class="login-inner">
      <div class="login-card">
        <h2>WallFlow</h2>
        <p class="mb-4" style="color:var(--muted);">Logga in för att uppdatera ledbyggnationen.</p>
        <div class="mb-3">
          <input id="admin-user" class="form-control form-control-lg" placeholder="Användarnamn" autocomplete="username">
        </div>
        <div class="mb-3">
          <input id="admin-pw" class="form-control form-control-lg" type="password" placeholder="Lösenord" autocomplete="current-password" onkeydown="if(event.key==='Enter')checkLogin()">
        </div>
        <label class="d-flex align-items-center gap-2 mb-3" style="color:var(--muted); font-size:.9rem;">
          <input type="checkbox" id="admin-remember-me"> Kom ihåg mig
        </label>
        <button id="login-btn" class="btn btn-accent btn-lg w-100" type="button" onclick="checkLogin()">Logga in</button>
        <div id="login-error" class="alert alert-danger mt-3 py-2 small" style="display:none;">Fel inloggningsuppgifter.</div>
      </div>
    </div>
  </div>

  <div id="app-admin">
    <div class="p-3 d-flex justify-content-between align-items-center border-bottom" style="border-color: var(--line) !important;">
      <div>
        <div class="small text-uppercase" style="color:var(--muted); letter-spacing:.08em;">Workbench</div>
        <strong id="admin-role-label">Admin</strong>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-sm btn-ghost" type="button" onclick="toggleAdmin(false)">Stäng</button>
        <button class="btn btn-sm btn-outline-danger" type="button" onclick="logoutAdmin()">Logga ut</button>
      </div>
    </div>
    <div class="admin-shell" id="admin-main"></div>
  </div>

  <div class="toast-wrap"><div id="toast" class="toast-msg"></div></div>

  <script>
/**********************************************************************
 * WallFlow — baserad på Crags-arkitekturen (GAS ↔ GitHub Pages)
 *
 * Sätt GAS_API_URL till din deployade Apps Script Web App-URL.
 * Lämna tom sträng för demoläge (lokal demo-data + localStorage).
 *********************************************************************/
const GAS_API_URL = ""; // t.ex. "https://script.google.com/macros/s/XXXX/exec"
const USE_DEMO = !GAS_API_URL || GAS_API_URL.includes("PASTE_");
const DEMO_STORAGE_KEY = "wallflow_demo_db_v1";
const REMEMBER_COOKIE = "wallflow_admin_remember_username";

const STATUS_META = {
  PLANERAD: { label: "Planerad", color: "#a8b0bd" },
  SATTS: { label: "Sätts", color: "#e8a54b" },
  AKTIV: { label: "Aktiv", color: "#6ec8b0" },
  STRIPPAS: { label: "Strippas", color: "#d67b5c" },
  ARKIVERAD: { label: "Arkiverad", color: "#555e6b" }
};
const PUBLIC_STATUSES = ["SATTS", "PLANERAD", "AKTIV", "STRIPPAS"];
const HOLD_COLORS = [
  { id: "orange", label: "Orange", hex: "#e67e22" },
  { id: "gul", label: "Gul", hex: "#f1c40f" },
  { id: "gron", label: "Grön", hex: "#2ecc71" },
  { id: "bla", label: "Blå", hex: "#3498db" },
  { id: "rod", label: "Röd", hex: "#e74c3c" },
  { id: "lila", label: "Lila", hex: "#9b59b6" },
  { id: "svart", label: "Svart", hex: "#2c3e50" },
  { id: "vit", label: "Vit", hex: "#ecf0f1" },

function apiCall_(action, args) {
  if (USE_DEMO) return demoApi_(action, args || []);
  const payload = { action, token: __sessionToken || "", args: args || [] };
  return fetch(GAS_API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain; charset=UTF-8" },
    redirect: "follow",
    body: JSON.stringify(payload)
  }).then((r) => r.json());
}

function createRunProxy_() {
  let successHandler = null;
  let failureHandler = null;
  const proxy = new Proxy({}, {
    get(_target, prop) {
      if (prop === "withSuccessHandler") {
        return (fn) => { successHandler = fn; return proxy; };
      }
      if (prop === "withFailureHandler") {
        return (fn) => { failureHandler = fn; return proxy; };
      }
      return (...args) => {
        apiCall_(String(prop), args)
          .then((res) => {
            if (String(prop) === "verifyAdminPassword" && res && res.token) {
              __sessionToken = res.token;
            }
            if (successHandler) successHandler(res);
          })
          .catch((err) => {
            if (failureHandler) failureHandler(err);
          });
      };
    }
  });
  return proxy;
}

function loadDemoDb_() {
  try {
    const raw = localStorage.getItem(DEMO_STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && Array.isArray(parsed.walls) && Array.isArray(parsed.routes)) return parsed;
    }
  } catch (_) {}
  const seeded = seedDemoDb_();
  saveDemoDb_(seeded);
  return seeded;
}

function saveDemoDb_(data) {
  localStorage.setItem(DEMO_STORAGE_KEY, JSON.stringify(data));
}

function demoTokenOk_(token) {
  return String(token || "") === "demo-token-admin";
}

function demoApi_(action, args) {
  return new Promise((resolve) => {
    setTimeout(() => {
      const store = loadDemoDb_();
      const ok = (data) => resolve(data);
      const fail = (msg) => resolve({ ok: false, error: msg || "Fel" });

      if (action === "getAppData") {
        return ok({
          walls: store.walls,
          routes: store.routes.filter((r) => r.Status !== "ARKIVERAD" || true)
        });
      }
      if (action === "verifyAdminPassword") {
        const [user, pw] = args;
        const u = (store.users || []).find((x) => x.username === String(user || "").trim() && x.password === String(pw || ""));
        if (!u) return ok({ authorized: false });
        return ok({ authorized: true, token: "demo-token-admin", role: u.role, username: u.username, name: u.name });
      }
      if (!demoTokenOk_(__sessionToken) && action !== "getAppData") {
        return fail("Ej inloggad");
      }

      if (action === "saveWall") {
        const [wall] = args;
        if (wall.ID) {
          const i = store.walls.findIndex((w) => w.ID === wall.ID);
          if (i >= 0) store.walls[i] = { ...store.walls[i], ...wall };
        } else {
          wall.ID = "w" + Date.now();
          wall.Order = store.walls.length + 1;
          store.walls.push(wall);
        }
        saveDemoDb_(store);
        return ok({ ok: true, wall });
      }
      if (action === "deleteWall") {
        const [id] = args;
        store.walls = store.walls.filter((w) => w.ID !== id);
        store.routes = store.routes.filter((r) => r.WallID !== id);
        saveDemoDb_(store);
        return ok({ ok: true });
      }
      if (action === "saveRoute") {
        const [route] = args;
        if (route.ID) {
          const i = store.routes.findIndex((r) => r.ID === route.ID);
          if (i >= 0) store.routes[i] = { ...store.routes[i], ...route };
        } else {
          route.ID = "r" + Date.now();
          route.Order = store.routes.filter((r) => r.WallID === route.WallID).length + 1;
          store.routes.push(route);
        }
        saveDemoDb_(store);
        return ok({ ok: true, route });
      }
      if (action === "deleteRoute") {
        const [id] = args;
        store.routes = store.routes.filter((r) => r.ID !== id);
        saveDemoDb_(store);
        return ok({ ok: true });
      }
      if (action === "getAllAdmins") {
        return ok((store.users || []).map((u) => ({ username: u.username, name: u.name, role: u.role })));
      }
      if (action === "createNewAdmin") {
        const [username, name, role, password] = args;
        if ((store.users || []).some((u) => u.username === username)) return fail("Användaren finns redan");
        store.users.push({ username, name, role: role || "admin", password: password || "changeme" });
        saveDemoDb_(store);
        return ok({ ok: true });
      }
      if (action === "updateUserRole") {
        const [username, role] = args;
        const u = (store.users || []).find((x) => x.username === username);
        if (!u) return fail("Hittades inte");
        u.role = role;
        saveDemoDb_(store);
        return ok({ ok: true });
      }
      if (action === "deleteUserAction") {
        const [username] = args;
        store.users = (store.users || []).filter((u) => u.username !== username);
        saveDemoDb_(store);
        return ok({ ok: true });
      }
      if (action === "changeOwnPassword") {
        const [oldPw, newPw] = args;
        const u = (store.users || []).find((x) => x.username === currentUser.username);
        if (!u || u.password !== oldPw) return fail("Fel lösenord");
        u.password = newPw;
        saveDemoDb_(store);
        return ok({ ok: true });
      }
      return fail("Okänd action: " + action);
    }, 120);
  });
}

/* ---------- Helpers ---------- */
function escapeHtml_(str) {
  return String(str == null ? "" : str)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function userRole_() {
  const r = String(currentUser && currentUser.role || "").toLowerCase().trim();
  if (!r) return "admin";
  if (r === "developer") return "scout";
  return r;
}
function canManageUsersRole() { return userRole_() === "superadmin"; }
function canDeleteContentRole() {
  const r = userRole_();
  return r === "superadmin" || r === "admin";
}
function canEditContentRole() {
  const r = userRole_();
  return r === "superadmin" || r === "admin" || r === "scout";
}
function adminRoleLabelSv() {
  const r = userRole_();
  if (r === "superadmin") return "Superadmin";
  if (r === "scout") return "Sättare";
  return "Admin";
}

function holdColor_(id) {
  return HOLD_COLORS.find((c) => c.id === id) || { id: id || "orange", label: id || "—", hex: "#e67e22" };
}
function statusLabel_(s) {
  return (STATUS_META[s] && STATUS_META[s].label) || s || "—";
}
function sortWalls_(walls) {
  return walls.slice().sort((a, b) => (Number(a.Order) || 0) - (Number(b.Order) || 0) || String(a.Namn).localeCompare(String(b.Namn), "sv"));
}
function sortRoutes_(routes) {
  const rank = { SATTS: 0, PLANERAD: 1, STRIPPAS: 2, AKTIV: 3, ARKIVERAD: 4 };
  return routes.slice().sort((a, b) => {
    const ra = rank[a.Status] ?? 9;
    const rb = rank[b.Status] ?? 9;
    if (ra !== rb) return ra - rb;
    return (Number(a.Order) || 0) - (Number(b.Order) || 0) || String(a.Namn).localeCompare(String(b.Namn), "sv");
  });
}
function wallById_(id) {
  return db.walls.find((w) => String(w.ID) === String(id));
}
function routeById_(id) {
  return db.routes.find((r) => String(r.ID) === String(id));
}

function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.classList.remove("show"), 2200);
}

function getCookie_(name) {
  const m = document.cookie.match(new RegExp("(?:^|; )" + name.replace(/([.$?*|{}()[\]\\/+^])/g, "\\$1") + "=([^;]*)"));
  return m ? decodeURIComponent(m[1]) : "";
}
function setRememberedAdminUsername(username) {
  if (!username) {
    document.cookie = REMEMBER_COOKIE + "=; Max-Age=0; path=/; SameSite=Lax";
    return;
  }
  document.cookie = REMEMBER_COOKIE + "=" + encodeURIComponent(username) + "; Max-Age=" + (400 * 86400) + "; path=/; SameSite=Lax";
}

  activeStatusFilter = key;

function switchView(view) {
  currentView = view;
  document.getElementById("view-flow").style.display = view === "flow" ? "block" : "none";
  document.getElementById("view-walls").style.display = view === "walls" ? "block" : "none";
  document.getElementById("nav-flow").classList.toggle("active", view === "flow");
  document.getElementById("nav-walls").classList.toggle("active", view === "walls");
  filterData();
}

function getSearchTokens_() {
  return String(document.getElementById("mainSearch").value || "")
    .toLowerCase().trim().split(/\s+/).filter(Boolean);
}

function routeMatches_(route, wall, tokens) {
  if (!tokens.length) return true;
  const color = holdColor_(route.Farg);
  const hay = [
    route.Namn, route.Grad, route.Setter, route.Status, statusLabel_(route.Status),
    route.Kommentar, wall && wall.Namn, color.label, color.id
  ].join(" ").toLowerCase();
  return tokens.every((t) => hay.includes(t));
}

function visibleRoutes_() {
  const tokens = getSearchTokens_();
  return sortRoutes_(db.routes.filter((r) => {
    if (r.Status === "ARKIVERAD") return false;
    if (activeStatusFilter !== "ALL" && r.Status !== activeStatusFilter) return false;
    const wall = wallById_(r.WallID);
    return routeMatches_(r, wall, tokens);
  }));
}

function filterData() {
  const routes = visibleRoutes_();
  if (currentView === "flow") renderFlow(routes);
  else renderWalls(routes);
}

function countByStatus_() {
  const c = { SATTS: 0, PLANERAD: 0, AKTIV: 0, STRIPPAS: 0 };
  db.routes.forEach((r) => { if (c[r.Status] != null) c[r.Status]++; });
  return c;
}

function renderFlow(routes) {
  const host = document.getElementById("view-flow");
  const counts = countByStatus_();
  const focus = routes.filter((r) => r.Status === "SATTS" || r.Status === "PLANERAD" || r.Status === "STRIPPAS");
  const show = activeStatusFilter === "ALL" ? (focus.length ? focus : routes) : routes;

  host.innerHTML = `
    <div class="hero-line">
      <h1>Följ flödet i hallen</h1>
      <p>Se vad som sätts, vad som strippas och vilka leder som just öppnats.</p>
    </div>
    <div class="stats">
      <div class="stat"><strong style="color:var(--status-satts)">${counts.SATTS}</strong><span>Sätts nu</span></div>
      <div class="stat"><strong style="color:var(--status-planerad)">${counts.PLANERAD}</strong><span>Planerade</span></div>
      <div class="stat"><strong style="color:var(--status-strippas)">${counts.STRIPPAS}</strong><span>Strippas</span></div>
    </div>
    <div class="section-label">
      <h2>${activeStatusFilter === "ALL" ? "Aktuellt i flödet" : statusLabel_(activeStatusFilter)}</h2>
      <span>${show.length} leder</span>
    </div>
    ${show.length ? `<div class="wall-routes" style="padding:0;">${show.map(routeRowHtml_).join("")}</div>` : `<div class="empty">Inga leder matchar filtret.</div>`}
  `;
}

function renderWalls(routes) {
  const host = document.getElementById("view-walls");
  const byWall = {};
  routes.forEach((r) => {
    const id = String(r.WallID);
    if (!byWall[id]) byWall[id] = [];
    byWall[id].push(r);
  });
  const walls = sortWalls_(db.walls).filter((w) => {
    if (getSearchTokens_().length || activeStatusFilter !== "ALL") return byWall[w.ID] && byWall[w.ID].length;
    return true;
  });

  host.innerHTML = `
    <div class="hero-line">
      <h1>Väggar</h1>
      <p>Översikt per sektor — öppna en vägg för att se lederna.</p>
    </div>
    ${walls.length ? walls.map((w, idx) => {
      const list = sortRoutes_(byWall[w.ID] || []);
      return `
        <div class="wall-block" style="animation-delay:${idx * 0.04}s">
          <div class="wall-head" onclick="openWall('${escapeHtml_(w.ID)}')">
            <div>
              <h3>${escapeHtml_(w.Namn)}</h3>

          <div class="wall-routes">

  `;
}

function routeRowHtml_(r) {
  const wall = wallById_(r.WallID);
  const color = holdColor_(r.Farg);
  return `
    <div class="route-row" onclick="openRoute('${escapeHtml_(r.ID)}')">
      <span class="route-dot" style="background:${color.hex}"></span>
      <div class="route-main">
        <strong>${escapeHtml_(r.Namn)}</strong>

    document.getElementById("app-admin").classList.add("show");

    renderAdminHome();
  } else {
    openLoginPanel();
  }
}

function openLoginPanel() {
  document.getElementById("login-error").style.display = "none";
  const remembered = getCookie_(REMEMBER_COOKIE);
  if (remembered) {
    document.getElementById("admin-user").value = remembered;
    document.getElementById("admin-remember-me").checked = true;
  }
  document.getElementById("login-panel").classList.add("show");
  setTimeout(() => document.getElementById(remembered ? "admin-pw" : "admin-user").focus(), 200);
}

function closeLoginPanel() {
  document.getElementById("login-panel").classList.remove("show");
}

function checkLogin() {
  const user = document.getElementById("admin-user").value.trim();
  const pw = document.getElementById("admin-pw").value;
  const btn = document.getElementById("login-btn");
  btn.disabled = true;
  btn.textContent = "Loggar in…";
  google.script.run
    .withSuccessHandler((res) => {
      btn.disabled = false;
      btn.textContent = "Logga in";
      if (!res || !res.authorized) {
        document.getElementById("login-error").style.display = "block";
        return;
      }
      currentUser = {
        authorized: true,
        role: res.role || "admin",
        username: res.username || user,
        name: res.name || ""
      };
      if (document.getElementById("admin-remember-me").checked) setRememberedAdminUsername(user);
      else setRememberedAdminUsername("");
      document.getElementById("admin-pw").value = "";
      closeLoginPanel();
      toggleAdmin(true);
      showToast("Inloggad");
    })
    .withFailureHandler(() => {
      btn.disabled = false;
      btn.textContent = "Logga in";
      document.getElementById("login-error").style.display = "block";
    })
    .verifyAdminPassword(user, pw);
}

function logoutAdmin() {
  currentUser = { authorized: false, role: null, username: null };

  document.getElementById("app-admin").classList.remove("show");

      <div class="d-flex flex-wrap gap-2">
        <button class="btn btn-accent btn-sm" type="button" onclick="renderWallForm()">+ Ny vägg</button>
        <button class="btn btn-accent btn-sm" type="button" onclick="renderRouteForm()">+ Ny led</button>
        <button class="btn btn-ghost btn-sm" type="button" onclick="renderPasswordForm()">Byt lösenord</button>
        ${canManageUsersRole() ? `<button class="btn btn-ghost btn-sm" type="button" onclick="renderUserManagement()">Användare</button>` : ""}
      </div>
    </div>

    <div class="admin-card">
      <h4>Väggar</h4>
      ${walls.map((w) => `
        <div class="d-flex justify-content-between align-items-center py-2 border-bottom" style="border-color:var(--line)!important;">
          <div>
            <strong>${escapeHtml_(w.Namn)}</strong>
            <div class="small" style="color:var(--muted);">${db.routes.filter((r) => String(r.WallID) === String(w.ID)).length} leder</div>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-sm btn-ghost" type="button" onclick="renderWallForm('${escapeHtml_(w.ID)}')">Redigera</button>
            ${canDeleteContentRole() ? `<button class="btn btn-sm btn-outline-danger" type="button" onclick="deleteWall('${escapeHtml_(w.ID)}')">Radera</button>` : ""}
          </div>
        </div>
      `).join("") || `<div class="empty">Inga väggar ännu.</div>`}
    </div>

    <div class="admin-card">
      <h4>Leder</h4>
      <div class="mb-2">
        <input class="form-control form-control-sm" id="admin-route-filter" placeholder="Filtrera leder…" oninput="renderAdminRouteList()">
      </div>
      <div id="admin-route-list"></div>
    </div>
  `;
  window.__adminAllRoutes = routes;
  renderAdminRouteList();
}

function renderAdminRouteList() {
  const q = String((document.getElementById("admin-route-filter") || {}).value || "").toLowerCase().trim();
  const host = document.getElementById("admin-route-list");
  if (!host) return;
  const list = sortRoutes_(db.routes).filter((r) => {
    if (!q) return true;
    const w = wallById_(r.WallID);
    return [r.Namn, r.Grad, r.Setter, r.Status, w && w.Namn].join(" ").toLowerCase().includes(q);
  });
  host.innerHTML = list.map((r) => {
    const w = wallById_(r.WallID);
    const color = holdColor_(r.Farg);
    return `
      <div class="d-flex justify-content-between align-items-center py-2 border-bottom" style="border-color:var(--line)!important; gap:8px;">
        <div style="min-width:0;">
          <strong style="display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
            <span class="color-swatch" style="background:${color.hex}"></span>${escapeHtml_(r.Namn)}
          </strong>
          <div class="small" style="color:var(--muted);">${escapeHtml_(r.Grad || "—")} · ${escapeHtml_(w ? w.Namn : "—")} · ${escapeHtml_(statusLabel_(r.Status))}</div>
        </div>
        <div class="d-flex gap-2 flex-shrink-0">
          <button class="btn btn-sm btn-ghost" type="button" onclick="renderRouteForm('${escapeHtml_(r.ID)}')">Redigera</button>
          ${canDeleteContentRole() ? `<button class="btn btn-sm btn-outline-danger" type="button" onclick="deleteRoute('${escapeHtml_(r.ID)}')">Radera</button>` : ""}
        </div>
      </div>`;
  }).join("") || `<div class="empty">Inga leder.</div>`;
}

function renderWallForm(id) {
  const w = id ? wallById_(id) : { ID: "", Namn: "", Info: "", Order: db.walls.length + 1 };
  document.getElementById("admin-main").innerHTML = `
    <div class="admin-card">
      <button class="btn btn-sm btn-ghost mb-3" type="button" onclick="renderAdminHome()">← Tillbaka</button>
      <h3>${id ? "Redigera vägg" : "Ny vägg"}</h3>
      <div class="mb-3"><label class="form-label">Namn</label><input id="f-wall-name" class="form-control" value="${escapeHtml_(w.Namn || "")}"></div>
      <div class="mb-3"><label class="form-label">Info</label><textarea id="f-wall-info" class="form-control" rows="3">${escapeHtml_(w.Info || "")}</textarea></div>
      <div class="mb-3"><label class="form-label">Ordning</label><input id="f-wall-order" type="number" class="form-control" value="${escapeHtml_(w.Order || 1)}"></div>
      <button class="btn btn-accent w-100" type="button" onclick="saveWall('${escapeHtml_(w.ID || "")}')">Spara vägg</button>
    </div>`;
}

function saveWall(id) {
  if (!canEditContentRole()) return showToast("Saknar behörighet");
  const wall = {
    ID: id || "",
    Namn: document.getElementById("f-wall-name").value.trim(),
    Info: document.getElementById("f-wall-info").value.trim(),
    Order: Number(document.getElementById("f-wall-order").value) || 1
  };
  if (!wall.Namn) return showToast("Namn saknas");
  google.script.run
    .withSuccessHandler((res) => {
      if (!res || res.ok === false) return showToast((res && res.error) || "Kunde inte spara");
      const saved = (res && res.wall) || wall;
      if (id) {
        const i = db.walls.findIndex((x) => x.ID === id);
        if (i >= 0) db.walls[i] = { ...db.walls[i], ...saved };
      } else {
        db.walls.push(saved);
      }
      showToast("Vägg sparad");
      renderAdminHome();
      filterData();
    })
    .withFailureHandler(() => showToast("Kunde inte spara"))
    .saveWall(wall);
}

function deleteWall(id) {
  if (!canDeleteContentRole()) return;
  if (!confirm("Radera väggen och alla dess leder?")) return;
  google.script.run
    .withSuccessHandler((res) => {
      if (!res || res.ok === false) return showToast((res && res.error) || "Kunde inte radera");
      db.walls = db.walls.filter((w) => w.ID !== id);
      db.routes = db.routes.filter((r) => r.WallID !== id);
      showToast("Vägg raderad");
      renderAdminHome();
      filterData();
    })
    .deleteWall(id);
}

function renderRouteForm(id) {
  const r = id ? routeById_(id) : {
    ID: "", WallID: (db.walls[0] && db.walls[0].ID) || "", Namn: "", Grad: "",
    Farg: "orange", Setter: currentUser.name || currentUser.username || "", Status: "PLANERAD",
    SetDate: new Date().toISOString().slice(0, 10), OpenDate: "", Kommentar: "", Order: 1
  };
  const wallOpts = sortWalls_(db.walls).map((w) =>
    `<option value="${escapeHtml_(w.ID)}" ${String(w.ID) === String(r.WallID) ? "selected" : ""}>${escapeHtml_(w.Namn)}</option>`
  ).join("");
  const statusOpts = Object.keys(STATUS_META).map((s) =>
    `<option value="${s}" ${r.Status === s ? "selected" : ""}>${STATUS_META[s].label}</option>`
  ).join("");
  const colorOpts = HOLD_COLORS.map((c) =>
    `<option value="${c.id}" ${r.Farg === c.id ? "selected" : ""}>${c.label}</option>`
  ).join("");

  document.getElementById("admin-main").innerHTML = `
    <div class="admin-card">
      <button class="btn btn-sm btn-ghost mb-3" type="button" onclick="renderAdminHome()">← Tillbaka</button>
      <h3>${id ? "Redigera led" : "Ny led"}</h3>
      <div class="mb-3"><label class="form-label">Namn</label><input id="f-route-name" class="form-control" value="${escapeHtml_(r.Namn || "")}"></div>
      <div class="row g-2 mb-3">
        <div class="col-6"><label class="form-label">Grad</label><input id="f-route-grade" class="form-control" value="${escapeHtml_(r.Grad || "")}" placeholder="t.ex. 6B+"></div>
        <div class="col-6"><label class="form-label">Färg</label><select id="f-route-color" class="form-select">${colorOpts}</select></div>
      </div>
      <div class="mb-3"><label class="form-label">Vägg</label><select id="f-route-wall" class="form-select">${wallOpts || "<option value=''>Ingen vägg</option>"}</select></div>
      <div class="row g-2 mb-3">
        <div class="col-6"><label class="form-label">Status</label><select id="f-route-status" class="form-select">${statusOpts}</select></div>
        <div class="col-6"><label class="form-label">Sättare</label><input id="f-route-setter" class="form-control" value="${escapeHtml_(r.Setter || "")}"></div>
      </div>
      <div class="row g-2 mb-3">
        <div class="col-6"><label class="form-label">Datum sätts</label><input id="f-route-setdate" type="date" class="form-control" value="${escapeHtml_(r.SetDate || "")}"></div>
        <div class="col-6"><label class="form-label">Öppnad</label><input id="f-route-opendate" type="date" class="form-control" value="${escapeHtml_(r.OpenDate || "")}"></div>
      </div>
      <div class="mb-3"><label class="form-label">Anteckning</label><textarea id="f-route-note" class="form-control" rows="3">${escapeHtml_(r.Kommentar || "")}</textarea></div>
      <button class="btn btn-accent w-100" type="button" onclick="saveRoute('${escapeHtml_(r.ID || "")}')">Spara led</button>
    </div>`;
}

function saveRoute(id) {
  if (!canEditContentRole()) return showToast("Saknar behörighet");
  const route = {
    ID: id || "",
    Namn: document.getElementById("f-route-name").value.trim(),
    Grad: document.getElementById("f-route-grade").value.trim(),
    Farg: document.getElementById("f-route-color").value,
    WallID: document.getElementById("f-route-wall").value,
    Status: document.getElementById("f-route-status").value,
    Setter: document.getElementById("f-route-setter").value.trim(),
    SetDate: document.getElementById("f-route-setdate").value,
    OpenDate: document.getElementById("f-route-opendate").value,
    Kommentar: document.getElementById("f-route-note").value.trim(),
    Order: id && routeById_(id) ? routeById_(id).Order : 1
  };
  if (!route.Namn) return showToast("Namn saknas");
  if (!route.WallID) return showToast("Välj vägg");
  if (route.Status === "AKTIV" && !route.OpenDate) {
    route.OpenDate = new Date().toISOString().slice(0, 10);
  }
  google.script.run
    .withSuccessHandler((res) => {
      if (!res || res.ok === false) return showToast((res && res.error) || "Kunde inte spara");
      const saved = (res && res.route) || route;
      if (id) {
        const i = db.routes.findIndex((x) => x.ID === id);
        if (i >= 0) db.routes[i] = { ...db.routes[i], ...saved };
      } else {
        db.routes.push(saved);
      }
      showToast("Led sparad");
      renderAdminHome();
      filterData();
    })
    .withFailureHandler(() => showToast("Kunde inte spara"))
    .saveRoute(route);
}

function deleteRoute(id) {
  if (!canDeleteContentRole()) return;
  if (!confirm("Radera leden?")) return;
  google.script.run
    .withSuccessHandler((res) => {
      if (!res || res.ok === false) return showToast((res && res.error) || "Kunde inte radera");
      db.routes = db.routes.filter((r) => r.ID !== id);
      showToast("Led raderad");
      renderAdminHome();
      filterData();
    })
    .deleteRoute(id);
}

function renderPasswordForm() {
  document.getElementById("admin-main").innerHTML = `
    <div class="admin-card">
      <button class="btn btn-sm btn-ghost mb-3" type="button" onclick="renderAdminHome()">← Tillbaka</button>
      <h3>Byt lösenord</h3>
      <div class="mb-3"><input id="pw-old" type="password" class="form-control" placeholder="Nuvarande lösenord"></div>
      <div class="mb-3"><input id="pw-new" type="password" class="form-control" placeholder="Nytt lösenord"></div>
      <button class="btn btn-accent w-100" type="button" onclick="changePassword()">Spara</button>
    </div>`;
}

function changePassword() {
  const oldPw = document.getElementById("pw-old").value;
  const newPw = document.getElementById("pw-new").value;
  if (!newPw || newPw.length < 4) return showToast("Nytt lösenord för kort");
  google.script.run
    .withSuccessHandler((res) => {
      if (!res || res.ok === false) return showToast((res && res.error) || "Kunde inte byta");
      showToast("Lösenord uppdaterat");
      renderAdminHome();
    })
    .changeOwnPassword(oldPw, newPw);
}

function renderUserManagement() {
  if (!canManageUsersRole()) return;
  document.getElementById("admin-main").innerHTML = `
    <div class="admin-card">
      <button class="btn btn-sm btn-ghost mb-3" type="button" onclick="renderAdminHome()">← Tillbaka</button>
      <h3>Användare</h3>
      <div class="row g-2 mb-3">
        <div class="col-6"><input id="nu-user" class="form-control form-control-sm" placeholder="Användarnamn"></div>
        <div class="col-6"><input id="nu-name" class="form-control form-control-sm" placeholder="Namn"></div>
        <div class="col-6">
          <select id="nu-role" class="form-select form-select-sm">
            <option value="admin">Admin</option>
            <option value="scout">Sättare</option>
            <option value="superadmin">Superadmin</option>
          </select>
        </div>
        <div class="col-6"><input id="nu-pw" class="form-control form-control-sm" placeholder="Temp-lösenord" value="changeme"></div>
      </div>
      <button class="btn btn-accent btn-sm mb-3" type="button" onclick="createUser()">Skapa användare</button>
      <div id="admin-user-list">Laddar…</div>
    </div>`;
  google.script.run
    .withSuccessHandler((users) => {
      const host = document.getElementById("admin-user-list");
      if (!host) return;
      const list = users || [];
      host.innerHTML = list.map((u) => `
        <div class="d-flex justify-content-between align-items-center py-2 border-bottom" style="border-color:var(--line)!important; gap:8px;">
          <div>
            <strong>${escapeHtml_(u.username)}</strong>
            <div class="small" style="color:var(--muted);">${escapeHtml_(u.name || "")}</div>
          </div>
          <div class="d-flex gap-2 align-items-center">
            <select class="form-select form-select-sm" style="width:auto;" onchange="updateRole('${escapeHtml_(u.username)}', this.value)">
              <option value="scout" ${u.role === "scout" ? "selected" : ""}>Sättare</option>
              <option value="admin" ${u.role === "admin" ? "selected" : ""}>Admin</option>
              <option value="superadmin" ${u.role === "superadmin" ? "selected" : ""}>Superadmin</option>
            </select>
            <button class="btn btn-sm btn-outline-danger" type="button" onclick="deleteUser('${escapeHtml_(u.username)}')">Radera</button>
          </div>
        </div>
      `).join("") || `<div class="empty">Inga användare.</div>`;
    })
    .getAllAdmins();
}

function createUser() {
  const username = document.getElementById("nu-user").value.trim();
  const name = document.getElementById("nu-name").value.trim();
  const role = document.getElementById("nu-role").value;
  const password = document.getElementById("nu-pw").value;
  if (!username) return showToast("Användarnamn saknas");
  google.script.run
    .withSuccessHandler((res) => {
      if (!res || res.ok === false) return showToast((res && res.error) || "Kunde inte skapa");
      showToast("Användare skapad");
      renderUserManagement();
    })
    .createNewAdmin(username, name, role, password);
}

function updateRole(username, role) {
  google.script.run
    .withSuccessHandler((res) => {
      if (!res || res.ok === false) return showToast((res && res.error) || "Kunde inte uppdatera");
      showToast("Roll uppdaterad");
    })
    .updateUserRole(username, role);
}

function deleteUser(username) {
  if (!confirm("Radera användare " + username + "?")) return;
  google.script.run
    .withSuccessHandler((res) => {
      if (!res || res.ok === false) return showToast((res && res.error) || "Kunde inte radera");
      showToast("Användare raderad");
      renderUserManagement();
    })
    .deleteUserAction(username);
}
  </script>
</body>
</html>
