<!DOCTYPE html>
<html lang="sv">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#12151a">
  <meta name="description" content="WallFlow — följ ledbyggnationen i klätterhallen.">
  <title>WallFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --bg: #12151a;
      --line: rgba(255, 255, 255, 0.08);
      --text: #f2efe8;
      --muted: #9aa3b2;
      --accent: #e8a54b;
      --accent-2: #6ec8b0;
      --rebuild: #e8a54b;
      --ok: #6ec8b0;
      --search-h: 52px;
      --nav-h: 64px;
      --radius: 18px;
      --font-display: "Syne", sans-serif;
      --font-body: "Figtree", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: var(--font-body);
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(232, 165, 75, 0.16), transparent 55%),
        radial-gradient(900px 500px at 100% 0%, rgba(110, 200, 176, 0.12), transparent 50%),
        linear-gradient(180deg, #161a21 0%, var(--bg) 40%, #0e1116 100%);
      overflow: hidden;
    }
    #loading-screen {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #0e1116;
      transition: opacity .45s ease, visibility .45s ease;
    }
    #loading-screen.hide { opacity: 0; visibility: hidden; pointer-events: none; }
    .brand-mark {
      font-family: var(--font-display); font-weight: 800;
      font-size: clamp(2.6rem, 10vw, 3.6rem); letter-spacing: -0.04em; line-height: 0.95; margin: 0;
      background: linear-gradient(120deg, #fff 10%, var(--accent) 55%, var(--accent-2) 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      animation: brandIn .8s ease both;
    }
    .brand-sub {
      margin-top: 10px; color: var(--muted); letter-spacing: 0.18em;
      text-transform: uppercase; font-size: 0.72rem; animation: brandIn .8s ease .12s both;
    }
    .loader-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
      margin-top: 28px; animation: pulseDot 1.1s ease-in-out infinite;
    }
    @keyframes brandIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    @keyframes pulseDot { 0%, 100% { transform: scale(1); opacity: .55; } 50% { transform: scale(1.35); opacity: 1; } }
    @keyframes riseIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
    @keyframes fadeSlide { from { opacity: 0; transform: translateX(8px); } to { opacity: 1; transform: none; } }

    #app-public { display: flex; flex-direction: column; height: 100%; min-height: 100dvh; position: relative; }
    .topbar {
      position: sticky; top: 0; z-index: 30;
      padding: calc(12px + var(--safe-top)) 16px 10px;
      background: linear-gradient(180deg, rgba(18,21,26,.96), rgba(18,21,26,.82) 70%, transparent);
      backdrop-filter: blur(10px);
    }
    .topbar-row { display: flex; align-items: center; gap: 12px; }
    .top-brand { font-family: var(--font-display); font-weight: 800; font-size: 1.35rem; letter-spacing: -0.03em; }
    .top-brand span { color: var(--accent); }
    .search-wrap {
      flex: 1; min-width: 0; display: flex; align-items: center; gap: 8px;
      height: var(--search-h); padding: 0 12px; border-radius: 14px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--line);
    }
    .search-wrap input { flex: 1; min-width: 0; border: 0; outline: 0; background: transparent; color: var(--text); font-size: 0.95rem; }
    .search-wrap input::placeholder { color: #6f7888; }
    .icon-btn {
      border: 0; background: transparent; color: var(--muted);
      width: 36px; height: 36px; border-radius: 10px; display: grid; place-items: center; cursor: pointer;
    }
    .icon-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
    .filter-row { display: flex; gap: 8px; overflow-x: auto; padding: 10px 16px 4px; scrollbar-width: none; }
    .filter-row::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto; border: 1px solid var(--line); background: rgba(255,255,255,0.03);
      color: var(--muted); border-radius: 999px; padding: 8px 14px; font-size: 0.82rem;
      font-weight: 600; cursor: pointer; transition: background .2s, color .2s, transform .2s;
    }
    .chip:hover { transform: translateY(-1px); }
    .chip.active { color: #12151a; background: var(--accent); border-color: transparent; }
    .chip[data-key="Ja"].active { background: var(--rebuild); }
    .chip[data-key="Nej"].active { background: var(--ok); }
    .scroll-area { flex: 1; min-height: 0; overflow-y: auto; padding: 8px 16px calc(98px + var(--safe-bottom)); }
    .hero-line { margin: 8px 0 18px; animation: riseIn .5s ease both; }
    .hero-line h1 {
      font-family: var(--font-display); font-size: clamp(1.7rem, 5.5vw, 2.2rem);
      font-weight: 800; letter-spacing: -0.03em; margin: 0 0 6px; line-height: 1.1;
    }
    .hero-line p { margin: 0; color: var(--muted); font-size: 0.95rem; max-width: 40ch; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; animation: riseIn .55s ease .05s both; }
    .stat {
      padding: 14px 12px; border-radius: 16px;
      background: linear-gradient(160deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      border: 1px solid var(--line);
    }
    .stat strong { display: block; font-family: var(--font-display); font-size: 1.45rem; line-height: 1; margin-bottom: 4px; }
    .stat span { color: var(--muted); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .section-label { display: flex; align-items: baseline; justify-content: space-between; margin: 18px 0 10px; }
    .section-label h2 { font-family: var(--font-display); font-size: 1.05rem; margin: 0; letter-spacing: -0.02em; }
    .section-label span { color: var(--muted); font-size: 0.8rem; }
    .color-block {
      margin-bottom: 14px; border-radius: var(--radius); background: rgba(255,255,255,0.03);
      border: 1px solid var(--line); overflow: hidden; animation: riseIn .5s ease both;
    }
    .color-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 14px 14px 10px; cursor: pointer; }
    .color-head h3 { margin: 0; font-family: var(--font-display); font-size: 1.05rem; letter-spacing: -0.02em; }
    .color-head small { color: var(--muted); }
    .route-list { padding: 0 10px 10px; display: grid; gap: 8px; }
    .route-row {
      display: grid; grid-template-columns: 10px 1fr auto; gap: 10px; align-items: center;
      padding: 12px; border-radius: 14px; background: rgba(0,0,0,0.22); border: 1px solid transparent;
      cursor: pointer; transition: border-color .2s, transform .2s, background .2s; animation: fadeSlide .35s ease both;
    }
    .route-row:hover { border-color: rgba(232,165,75,0.35); transform: translateX(2px); background: rgba(0,0,0,0.32); }
    .route-dot { width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 0 3px rgba(255,255,255,0.04); }
    .route-main { min-width: 0; }
    .route-main strong { display: block; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .route-main span { display: block; color: var(--muted); font-size: 0.78rem; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badge-rebuild {
      display: inline-block; padding: 4px 8px; border-radius: 999px; font-size: 0.68rem;
      font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase; color: #12151a;
    }
    .badge-rebuild.Ja { background: var(--rebuild); }
    .badge-rebuild.Nej { background: var(--ok); }
    .empty { text-align: center; color: var(--muted); padding: 40px 16px; border: 1px dashed var(--line); border-radius: var(--radius); }
    .modern-nav {
      position: fixed; left: 50%; bottom: calc(18px + var(--safe-bottom)); transform: translateX(-50%);
      width: min(420px, calc(100% - 24px)); height: var(--nav-h); display: flex; gap: 6px; padding: 6px;
      border-radius: 999px; background: rgba(20, 24, 31, 0.88); border: 1px solid var(--line);
      backdrop-filter: blur(14px); z-index: 40; box-shadow: 0 16px 40px rgba(0,0,0,0.35);
    }
    .nav-item {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; border-radius: 999px;
      color: var(--muted); cursor: pointer; font-weight: 700; font-size: 0.82rem; transition: all .25s ease;
    }
    .nav-item.active { background: rgba(255,255,255,0.08); color: var(--text); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06); }
    #panel {
      position: fixed; left: 0; right: 0; bottom: 0; max-height: min(82vh, 720px); background: #171b22;
      border-radius: 22px 22px 0 0; border: 1px solid var(--line); border-bottom: 0; z-index: 50;
      transform: translateY(110%); transition: transform .35s cubic-bezier(.2,.8,.2,1);
      display: flex; flex-direction: column; box-shadow: 0 -20px 60px rgba(0,0,0,0.45);
    }
    #panel.open { transform: translateY(0); }
    .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 16px 8px; border-bottom: 1px solid var(--line); }
    .panel-header h5 { margin: 0; font-family: var(--font-display); font-size: 1.2rem; letter-spacing: -0.02em; }
    #panel-body { overflow-y: auto; padding: 14px 16px calc(24px + var(--safe-bottom)); }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0 16px; }
    .detail-cell { padding: 12px; border-radius: 14px; background: rgba(255,255,255,0.03); border: 1px solid var(--line); }
    .detail-cell label { display: block; color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .detail-cell strong { font-size: 0.95rem; }
    #login-panel, #app-admin { position: fixed; inset: 0; z-index: 80; background: #10141a; display: none; flex-direction: column; }
    #login-panel.show, #app-admin.show { display: flex; }
    .login-inner { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-card { width: min(360px, 100%); }
    .login-card h2 { font-family: var(--font-display); font-weight: 800; letter-spacing: -0.03em; margin: 0 0 6px; }
    .form-control, .form-select {
      background: rgba(255,255,255,0.04) !important; border: 1px solid var(--line) !important;
      color: var(--text) !important; border-radius: 12px !important;
    }
    .form-control:focus, .form-select:focus {
      border-color: rgba(232,165,75,0.55) !important; box-shadow: 0 0 0 3px rgba(232,165,75,0.15) !important;
    }
    .btn-accent { background: var(--accent); border: 0; color: #12151a; font-weight: 700; border-radius: 12px; }
    .btn-accent:hover { filter: brightness(1.05); color: #12151a; }
    .btn-ghost { background: transparent; border: 1px solid var(--line); color: var(--text); border-radius: 12px; }
    .admin-shell { max-width: 820px; margin: 0 auto; width: 100%; padding: 16px 16px calc(40px + var(--safe-bottom)); overflow-y: auto; flex: 1; }
    .admin-card { background: rgba(255,255,255,0.03); border: 1px solid var(--line); border-radius: 16px; padding: 14px; margin-bottom: 12px; }
    .admin-card h3, .admin-card h4 { font-family: var(--font-display); letter-spacing: -0.02em; margin: 0 0 10px; }
    .toast-wrap { position: fixed; left: 50%; bottom: calc(92px + var(--safe-bottom)); transform: translateX(-50%); z-index: 100; pointer-events: none; }
    .toast-msg {
      background: #243041; border: 1px solid var(--line); color: var(--text); padding: 10px 14px;
      border-radius: 12px; font-size: 0.88rem; opacity: 0; transition: opacity .25s; box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    .toast-msg.show { opacity: 1; }
    .demo-banner {
      margin: 0 16px 10px; padding: 8px 12px; border-radius: 12px;
      background: rgba(232,165,75,0.12); border: 1px solid rgba(232,165,75,0.28);
      color: #f0d2a4; font-size: 0.78rem; font-weight: 600;
    }
    .color-swatch {
      width: 14px; height: 14px; border-radius: 50%; display: inline-block; vertical-align: -2px;
      margin-right: 6px; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2);
    }
    .topo-img { width: 100%; border-radius: 14px; margin-top: 10px; border: 1px solid var(--line); }
  </style>
</head>
<body>
  <div id="loading-screen">
    <h1 class="brand-mark">WallFlow</h1>
    <div class="brand-sub">Ledbyggnation</div>
    <div class="loader-dot" aria-hidden="true"></div>
  </div>

  <div id="app-public">
    <div class="topbar">
      <div class="topbar-row">
        <div class="top-brand">Wall<span>Flow</span></div>

          <input id="mainSearch" type="search" placeholder="Sök nr, färg, byggare, anteckning…" oninput="filterData()" autocomplete="off">

  <div id="app-admin">
    <div class="p-3 d-flex justify-content-between align-items-center border-bottom" style="border-color: var(--line) !important;">

  <div class="toast-wrap"><div id="toast" class="toast-msg"></div></div>

  <script>
/**********************************************************************
 * WallFlow — GAS ↔ GitHub Pages (samma brygga som Crags)
 *
 * Sheet: 1K71FH4c9FpBuxF6noBlzmF_nA5VXhAtiV84sTbPmWi0
 * Flik "Alla leder": Nr | Gradering | Dags att bygga om | Ledbyggare | Byggdatum | Slutdatum | Anteckningar | Bild
 * Flik "Users": Username | passwordHash | salt | role | name | FirstLogin
 *********************************************************************/
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzw_23y8uDOGJneWK7sPDAJdaUbOFvHX2X7Xq4qnZ3NF8IjDbNRIcayxFKGof9mg2yglA/exec";
const USE_DEMO = !GAS_API_URL || GAS_API_URL.includes("PASTE_");
const DEMO_STORAGE_KEY = "wallflow_demo_db_v2";
const REMEMBER_COOKIE = "wallflow_admin_remember_username";

const COLOR_HEX = {
  "Blå": "#3498db",
  "Vit": "#ecf0f1",
  "Svart": "#2c3e50",
  "Röd": "#e74c3c",
  "Grön": "#2ecc71",
  "Wildcard": "#f39c12",
  "Orange": "#e67e22",
  "Gul": "#f1c40f",
  "Rosa": "#ff6b9d",
  "Lila": "#9b59b6"
};
const COLOR_ORDER = ["Blå", "Grön", "Röd", "Vit", "Svart", "Wildcard", "Orange", "Gul", "Rosa", "Lila"];

let __sessionToken = null;
let currentUser = { authorized: false, role: null, username: null, firstLogin: false };
let db = { routes: [] };
let currentView = "flow";
let rebuildFilter = "Ja"; // default: visa det som ska byggas om
let colorFilter = "ALL";

function apiCall_(action, args) {
  if (USE_DEMO) return demoApi_(action, args || []);
  const payload = { action, token: __sessionToken || "", args: args || [] };
  return fetch(GAS_API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain; charset=UTF-8" },
    redirect: "follow",
    body: JSON.stringify(payload)
  }).then((r) => r.json());
}

function createRunProxy_() {
  let successHandler = null;
  let failureHandler = null;
  const proxy = new Proxy({}, {
    get(_target, prop) {
      if (prop === "withSuccessHandler") return (fn) => { successHandler = fn; return proxy; };
      if (prop === "withFailureHandler") return (fn) => { failureHandler = fn; return proxy; };
      return (...args) => {
        apiCall_(String(prop), args)
          .then((res) => {
            if (String(prop) === "verifyAdminPassword" && res && res.token) __sessionToken = res.token;
            if (successHandler) successHandler(res);
          })
          .catch((err) => { if (failureHandler) failureHandler(err); });
      };
    }
  });
  return proxy;
}
window.google = window.google || {};
window.google.script = window.google.script || {};
window.google.script.run = createRunProxy_();

/* ---------- Demo ---------- */

      { Nr: "2", Gradering: "Blå", DagsAttByggaOm: "Ja", Ledbyggare: "Jesper", Byggdatum: "2026-04-27", Slutdatum: "2026-05-27", Anteckningar: "", Bild: "" },
      { Nr: "13", Gradering: "Blå", DagsAttByggaOm: "Nej", Ledbyggare: "Christoffer", Byggdatum: "2026-06-29", Slutdatum: "2026-07-29", Anteckningar: "", Bild: "" },
      { Nr: "15", Gradering: "Röd", DagsAttByggaOm: "Nej", Ledbyggare: "Christoffer", Byggdatum: "2026-06-26", Slutdatum: "2026-07-26", Anteckningar: "Black jack", Bild: "" },
      { Nr: "5", Gradering: "Svart", DagsAttByggaOm: "Ja", Ledbyggare: "August", Byggdatum: "2026-05-03", Slutdatum: "2026-06-02", Anteckningar: "", Bild: "" },
      { Nr: "8", Gradering: "Grön", DagsAttByggaOm: "Ja", Ledbyggare: "Patric", Byggdatum: "2026-05-03", Slutdatum: "2026-06-02", Anteckningar: "", Bild: "" },
      { Nr: "4", Gradering: "Vit", DagsAttByggaOm: "Ja", Ledbyggare: "August och Gustav", Byggdatum: "2026-05-03", Slutdatum: "2026-06-02", Anteckningar: "", Bild: "" }
    ],
    users: [{ username: "admin", name: "Admin", role: "superadmin", password: "wallflow", FirstLogin: false }]
  };
}
function loadDemoDb_() {
  try {
    const raw = localStorage.getItem(DEMO_STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && Array.isArray(parsed.routes)) return parsed;
    }
  } catch (_) {}
  const seeded = seedDemoDb_();
  saveDemoDb_(seeded);
  return seeded;
}
function saveDemoDb_(data) { localStorage.setItem(DEMO_STORAGE_KEY, JSON.stringify(data)); }

function demoApi_(action, args) {
  return new Promise((resolve) => {
    setTimeout(() => {
      const store = loadDemoDb_();
      const ok = (data) => resolve(data);
      const fail = (msg) => resolve({ ok: false, error: msg || "Fel" });

      if (action === "getAppData") return ok({ routes: store.routes });
      if (action === "verifyAdminPassword") {
        const [user, pw] = args;
        const u = (store.users || []).find((x) => x.username === String(user || "").trim() && x.password === String(pw || ""));
        if (!u) return ok({ authorized: false });
        __sessionToken = "demo-token-admin";
        return ok({ authorized: true, token: __sessionToken, role: u.role, username: u.username, name: u.name, firstLogin: !!u.FirstLogin });
      }
      if (__sessionToken !== "demo-token-admin" && action !== "getAppData") return fail("Ej inloggad");

      if (action === "saveRoute") {
        const [route] = args;
        const role = String(currentUser.role || "").toLowerCase();
        const isSuper = role === "superadmin";
        if (route.Nr) {
          const i = store.routes.findIndex((r) => String(r.Nr) === String(route.Nr));
          if (i >= 0) {
            store.routes[i] = { ...store.routes[i], ...route };
          } else if (!isSuper) {
            return fail("Bara superadmin kan lägga till leder");
          } else {
            store.routes.push(route);
          }
        } else if (!isSuper) {
          return fail("Bara superadmin kan lägga till leder");
        } else {
          const max = store.routes.reduce((m, r) => Math.max(m, Number(r.Nr) || 0), 0);
          route.Nr = String(max + 1);
          store.routes.push(route);
        }
        saveDemoDb_(store);
        return ok({ ok: true, route });
      }
      if (action === "deleteRoute") {
        if (String(currentUser.role || "").toLowerCase() !== "superadmin") {
          return fail("Bara superadmin kan ta bort leder");
        }
        const [nr] = args;
        store.routes = store.routes.filter((r) => String(r.Nr) !== String(nr));
        saveDemoDb_(store);
        return ok({ ok: true });
      }
      if (action === "getAllAdmins") {
        return ok((store.users || []).map((u) => ({ username: u.username, name: u.name, role: u.role })));
      }
      if (action === "createNewAdmin") {
        const payload = args[0] || {};
        if ((store.users || []).some((u) => u.username === payload.username)) return fail("Användaren finns redan");
        store.users.push({ username: payload.username, name: payload.name || "", role: payload.role || "admin", password: payload.password || "changeme", FirstLogin: true });
        saveDemoDb_(store);
        return ok({ ok: true });
      }
      if (action === "updateUserRole") {
        const [username, role] = args;
        const u = (store.users || []).find((x) => x.username === username);
        if (!u) return fail("Hittades inte");
        u.role = role;
        saveDemoDb_(store);
        return ok({ ok: true });
      }
      if (action === "deleteUserAction") {
        store.users = (store.users || []).filter((u) => u.username !== args[0]);
        saveDemoDb_(store);
        return ok({ ok: true });
      }
      if (action === "changeOwnPassword" || action === "finalizeUserPassword") {
        const u = (store.users || []).find((x) => x.username === currentUser.username);
        if (!u) return fail("Hittades inte");
        if (action === "changeOwnPassword" && u.password !== args[0]) return fail("Fel lösenord");
        u.password = action === "finalizeUserPassword" ? args[1] : args[1];
        u.FirstLogin = false;
        saveDemoDb_(store);
        return ok({ ok: true });
      }
      return fail("Okänd action: " + action);
    }, 80);
  });
}

/* ---------- Helpers ---------- */
function escapeHtml_(str) {
  return String(str == null ? "" : str)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}
function colorHex_(name) {
  return COLOR_HEX[name] || "#95a5a6";
}
function userRole_() {
  const r = String(currentUser && currentUser.role || "").toLowerCase().trim();
  if (r === "developer") return "scout";
  return r || "admin";
}
function canManageUsersRole() { return userRole_() === "superadmin"; }
/** Superadmin: lägga till / ta bort led-rader. Övriga ser bara redigera. */
function canManageRouteStructureRole() { return userRole_() === "superadmin"; }
function canEditContentRole() {
  const r = userRole_();
  return r === "superadmin" || r === "admin" || r === "scout";
}
function adminRoleLabelSv() {
  const r = userRole_();
  if (r === "superadmin") return "Superadmin";
  if (r === "scout") return "Sättare";
  return "Admin";
}
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.classList.remove("show"), 2200);
}
function getCookie_(name) {
  const m = document.cookie.match(new RegExp("(?:^|; )" + name.replace(/([.$?*|{}()[\]\\/+^])/g, "\\$1") + "=([^;]*)"));
  return m ? decodeURIComponent(m[1]) : "";
}
function setRememberedAdminUsername(username) {
  if (!username) {
    document.cookie = REMEMBER_COOKIE + "=; Max-Age=0; path=/; SameSite=Lax";
    return;
  }
  document.cookie = REMEMBER_COOKIE + "=" + encodeURIComponent(username) + "; Max-Age=" + (400 * 86400) + "; path=/; SameSite=Lax";
}
function sortRoutes_(routes) {
  return routes.slice().sort((a, b) => {
    if (a.DagsAttByggaOm !== b.DagsAttByggaOm) return a.DagsAttByggaOm === "Ja" ? -1 : 1;
    const na = Number(a.Nr), nb = Number(b.Nr);
    const aNum = !isNaN(na) && String(a.Nr) !== "";
    const bNum = !isNaN(nb) && String(b.Nr) !== "";
    if (aNum && bNum) return na - nb;
    if (aNum) return -1;
    if (bNum) return 1;
    return String(a.Gradering || "").localeCompare(String(b.Gradering || ""), "sv");
  });
}
function routeKey_(r) {
  return String(r.Nr != null && r.Nr !== "" ? r.Nr : ("x-" + (r.Gradering || "") + "-" + (r.Byggdatum || "") + "-" + (r.Anteckningar || "")));
}
function routeByNr_(nr) {
  return db.routes.find((r) => String(r.Nr) === String(nr));
}
function normalizeRoute_(r) {
  return {
    Nr: r.Nr == null ? "" : String(r.Nr),
    Gradering: String(r.Gradering || ""),
    DagsAttByggaOm: String(r.DagsAttByggaOm || r["Dags att bygga om"] || "").trim() === "Nej" ? "Nej" : (String(r.DagsAttByggaOm || r["Dags att bygga om"] || "").trim() === "Ja" ? "Ja" : String(r.DagsAttByggaOm || r["Dags att bygga om"] || "")),
    Ledbyggare: String(r.Ledbyggare || ""),
    Byggdatum: String(r.Byggdatum || "").slice(0, 10),
    Slutdatum: String(r.Slutdatum || "").slice(0, 10),
    Anteckningar: String(r.Anteckningar || ""),
    Bild: String(r.Bild || "")
  };
}

/* ---------- Boot ---------- */
window.addEventListener("load", () => {
  if (USE_DEMO) document.getElementById("demo-banner").style.display = "block";
  renderFilters();
  google.script.run
    .withSuccessHandler((data) => {
      db.routes = ((data && data.routes) || []).map(normalizeRoute_);
      filterData();
      hideLoadingScreen();
    })
    .withFailureHandler(() => {
      db.routes = seedDemoDb_().routes.map(normalizeRoute_);
      document.getElementById("demo-banner").style.display = "block";
      filterData();
      hideLoadingScreen();
      showToast("Kunde inte nå backend — visar lokal data");
    })
    .getAppData();
});
function hideLoadingScreen() { document.getElementById("loading-screen").classList.add("hide"); }

function availableColors_() {
  const set = new Set(db.routes.map((r) => r.Gradering).filter(Boolean));
  const ordered = COLOR_ORDER.filter((c) => set.has(c));
  const rest = [...set].filter((c) => !COLOR_ORDER.includes(c)).sort((a, b) => a.localeCompare(b, "sv"));
  return ordered.concat(rest);
}

function renderFilters() {
  const rebuildHost = document.getElementById("rebuild-filters");
  const rebuildItems = [
    { key: "Ja", label: "Bygg om" },
    { key: "Nej", label: "Aktuella" },
    { key: "ALL", label: "Alla" }
  ];
  rebuildHost.innerHTML = rebuildItems.map((it) =>
    `<button type="button" class="chip${rebuildFilter === it.key ? " active" : ""}" data-key="${it.key}" onclick="setRebuildFilter('${it.key}')">${escapeHtml_(it.label)}</button>`
  ).join("");

  const colorHost = document.getElementById("color-filters");
  const colors = [{ key: "ALL", label: "Alla färger" }].concat(availableColors_().map((c) => ({ key: c, label: c })));
  colorHost.innerHTML = colors.map((it) =>
    `<button type="button" class="chip${colorFilter === it.key ? " active" : ""}" data-key="${escapeHtml_(it.key)}" onclick="setColorFilter('${escapeHtml_(it.key)}')">${escapeHtml_(it.label)}</button>`
  ).join("");
}
function setRebuildFilter(key) { rebuildFilter = key; renderFilters(); filterData(); }
function setColorFilter(key) { colorFilter = key; renderFilters(); filterData(); }

function switchView(view) {
  currentView = view;
  document.getElementById("view-flow").style.display = view === "flow" ? "block" : "none";
  document.getElementById("view-colors").style.display = view === "colors" ? "block" : "none";
  document.getElementById("nav-flow").classList.toggle("active", view === "flow");
  document.getElementById("nav-colors").classList.toggle("active", view === "colors");
  filterData();
}

function getSearchTokens_() {
  return String(document.getElementById("mainSearch").value || "").toLowerCase().trim().split(/\s+/).filter(Boolean);
}
function routeMatches_(r, tokens) {
  if (!tokens.length) return true;
  const hay = [r.Nr, r.Gradering, r.DagsAttByggaOm, r.Ledbyggare, r.Byggdatum, r.Slutdatum, r.Anteckningar].join(" ").toLowerCase();
  return tokens.every((t) => hay.includes(t));
}
function visibleRoutes_() {
  const tokens = getSearchTokens_();
  return sortRoutes_(db.routes.filter((r) => {
    if (rebuildFilter !== "ALL" && r.DagsAttByggaOm !== rebuildFilter) return false;
    if (colorFilter !== "ALL" && r.Gradering !== colorFilter) return false;
    return routeMatches_(r, tokens);
  }));
}
function counts_() {
  let ja = 0, nej = 0;
  db.routes.forEach((r) => { if (r.DagsAttByggaOm === "Ja") ja++; else if (r.DagsAttByggaOm === "Nej") nej++; });
  return { ja, nej, total: db.routes.length };
}

function filterData() {
  renderFilters();
  const routes = visibleRoutes_();
  if (currentView === "flow") renderFlow(routes);
  else renderColors(routes);
}

function renderFlow(routes) {
  const c = counts_();
  document.getElementById("view-flow").innerHTML = `
    <div class="hero-line">
      <h1>Dags att bygga om</h1>
      <p>Leder från bladet <em>Alla leder</em> — filtrera på ombyggnad och färg.</p>
    </div>
    <div class="stats">
      <div class="stat"><strong style="color:var(--rebuild)">${c.ja}</strong><span>Bygg om</span></div>
      <div class="stat"><strong style="color:var(--ok)">${c.nej}</strong><span>Aktuella</span></div>
      <div class="stat"><strong>${c.total}</strong><span>Totalt</span></div>
    </div>
    <div class="section-label">
      <h2>${rebuildFilter === "Ja" ? "Behöver byggas om" : rebuildFilter === "Nej" ? "Aktuella leder" : "Alla leder"}</h2>
      <span>${routes.length} st</span>
    </div>
    ${routes.length ? `<div class="route-list" style="padding:0;">${routes.map(routeRowHtml_).join("")}</div>` : `<div class="empty">Inga leder matchar filtret.</div>`}
  `;
}

function renderColors(routes) {
  const byColor = {};
  routes.forEach((r) => {
    const key = r.Gradering || "Övrigt";
    if (!byColor[key]) byColor[key] = [];
    byColor[key].push(r);
  });
  const colors = availableColors_().filter((c) => byColor[c] && byColor[c].length);
  Object.keys(byColor).forEach((c) => { if (!colors.includes(c)) colors.push(c); });

  document.getElementById("view-colors").innerHTML = `
    <div class="hero-line">
      <h1>Efter färg</h1>
      <p>Grupperat på gradering från sheetet.</p>
    </div>
    ${colors.length ? colors.map((c, idx) => `
      <div class="color-block" style="animation-delay:${idx * 0.04}s">
        <div class="color-head" onclick="setColorFilter('${escapeHtml_(c)}'); switchView('flow');">
          <div>
            <h3><span class="color-swatch" style="background:${colorHex_(c)}"></span>${escapeHtml_(c)}</h3>
            <small>${byColor[c].length} leder · ${byColor[c].filter((r) => r.DagsAttByggaOm === "Ja").length} att bygga om</small>
          </div>
          <span style="color:var(--muted)">›</span>
        </div>
        <div class="route-list">${byColor[c].slice(0, 5).map(routeRowHtml_).join("")}</div>
      </div>
    `).join("") : `<div class="empty">Inga leder matchar.</div>`}
  `;
}

function routeRowHtml_(r) {
  const title = r.Nr ? `Led ${r.Nr}` : (r.Gradering || "Led");
  const note = r.Anteckningar || r.Ledbyggare || "—";
  return `
    <div class="route-row" onclick="openRoute('${escapeHtml_(routeKey_(r))}')">
      <span class="route-dot" style="background:${colorHex_(r.Gradering)}"></span>
      <div class="route-main">
        <strong>${escapeHtml_(title)}${r.Anteckningar ? " · " + escapeHtml_(r.Anteckningar) : ""}</strong>
        <span>${escapeHtml_(r.Gradering || "—")}${r.Ledbyggare ? " · " + escapeHtml_(r.Ledbyggare) : ""} · ${escapeHtml_(r.Byggdatum || "—")}</span>
      </div>
      <div><span class="badge-rebuild ${escapeHtml_(r.DagsAttByggaOm)}">${r.DagsAttByggaOm === "Ja" ? "Bygg om" : "Aktuell"}</span></div>
    </div>`;
}

function openRoute(key) {
  const r = db.routes.find((x) => routeKey_(x) === key);

function closePanel() { document.getElementById("panel").classList.remove("open"); }

/* ---------- Auth / Admin ---------- */
function toggleAdmin(show) {
  if (!show) { document.getElementById("app-admin").classList.remove("show"); return; }
  if (currentUser.authorized) {
    document.getElementById("app-admin").classList.add("show");
    document.getElementById("admin-role-label").textContent = adminRoleLabelSv();
    if (currentUser.firstLogin) renderForcePasswordChange();
    else renderAdminHome();
  } else openLoginPanel();
}
function openLoginPanel() {
  document.getElementById("login-error").style.display = "none";
  const remembered = getCookie_(REMEMBER_COOKIE);
  if (remembered) {
    document.getElementById("admin-user").value = remembered;
    document.getElementById("admin-remember-me").checked = true;
  }
  document.getElementById("login-panel").classList.add("show");
}
function closeLoginPanel() { document.getElementById("login-panel").classList.remove("show"); }

function checkLogin() {
  const user = document.getElementById("admin-user").value.trim();
  const pw = document.getElementById("admin-pw").value;
  const btn = document.getElementById("login-btn");
  btn.disabled = true; btn.textContent = "Loggar in…";
  google.script.run
    .withSuccessHandler((res) => {
      btn.disabled = false; btn.textContent = "Logga in";
      if (!res || !res.authorized) {
        document.getElementById("login-error").style.display = "block";
        return;
      }
      currentUser = {
        authorized: true,
        role: res.role || "admin",
        username: res.username || user,
        name: res.name || "",
        firstLogin: !!res.firstLogin
      };
      if (document.getElementById("admin-remember-me").checked) setRememberedAdminUsername(user);
      else setRememberedAdminUsername("");
      document.getElementById("admin-pw").value = "";
      closeLoginPanel();
      toggleAdmin(true);
      showToast("Inloggad");
    })
    .withFailureHandler(() => {
      btn.disabled = false; btn.textContent = "Logga in";
      document.getElementById("login-error").style.display = "block";
    })
    .verifyAdminPassword(user, pw);
}
function logoutAdmin() {
  currentUser = { authorized: false, role: null, username: null, firstLogin: false };
  __sessionToken = null;
  document.getElementById("app-admin").classList.remove("show");
  showToast("Utloggad");
}

function renderForcePasswordChange() {
  document.getElementById("admin-main").innerHTML = `
    <div class="admin-card">

      <div id="pw-change-error" class="alert alert-danger py-2 small" style="display:none;"></div>
      <button class="btn btn-accent w-100" type="button" onclick="handlePasswordChange()">Spara lösenord</button>
    </div>`;
}
function handlePasswordChange() {

function renderRouteForm(nr) {
  if (!nr && !canManageRouteStructureRole()) {
    showToast("Bara superadmin kan lägga till leder");
    return renderAdminHome();
  }
  const r = nr ? routeByNr_(nr) : null;
  if (nr && !r) {
    showToast("Leden hittades inte");
    return renderAdminHome();
  }
  const route = r || {
    Nr: "", Gradering: "Blå", DagsAttByggaOm: "Ja", Ledbyggare: currentUser.name || currentUser.username || "",
    Byggdatum: new Date().toISOString().slice(0, 10), Slutdatum: "", Anteckningar: "", Bild: ""
  };
  const colors = Array.from(new Set(COLOR_ORDER.concat(availableColors_())));
  const colorOpts = colors.map((c) => `<option value="${escapeHtml_(c)}" ${route.Gradering === c ? "selected" : ""}>${escapeHtml_(c)}</option>`).join("");
  const nrReadonly = !!nr || !canManageRouteStructureRole();
  document.getElementById("admin-main").innerHTML = `
    <div class="admin-card">
      <button class="btn btn-sm btn-ghost mb-3" type="button" onclick="renderAdminHome()">← Tillbaka</button>
      <h3>${nr ? "Redigera led " + escapeHtml_(nr) : "Ny led"}</h3>
      <div class="row g-2 mb-3">
        <div class="col-4"><label class="form-label">Nr</label><input id="f-nr" class="form-control" value="${escapeHtml_(route.Nr)}" ${nrReadonly ? "readonly" : ""} placeholder="auto"></div>
        <div class="col-4"><label class="form-label">Gradering</label><select id="f-grad" class="form-select">${colorOpts}</select></div>
        <div class="col-4"><label class="form-label">Bygg om</label>
          <select id="f-rebuild" class="form-select">
            <option value="Ja" ${route.DagsAttByggaOm === "Ja" ? "selected" : ""}>Ja</option>
            <option value="Nej" ${route.DagsAttByggaOm === "Nej" ? "selected" : ""}>Nej</option>
          </select>
        </div>
      </div>
      <div class="mb-3"><label class="form-label">Ledbyggare</label><input id="f-setter" class="form-control" value="${escapeHtml_(route.Ledbyggare)}"></div>
      <div class="row g-2 mb-3">
        <div class="col-6"><label class="form-label">Byggdatum</label><input id="f-build" type="date" class="form-control" value="${escapeHtml_(route.Byggdatum)}"></div>
        <div class="col-6"><label class="form-label">Slutdatum</label><input id="f-end" type="date" class="form-control" value="${escapeHtml_(route.Slutdatum)}"></div>
      </div>
      <div class="mb-3"><label class="form-label">Anteckningar</label><textarea id="f-notes" class="form-control" rows="3">${escapeHtml_(route.Anteckningar)}</textarea></div>
      <div class="mb-3"><label class="form-label">Bild (Drive-ID eller URL)</label><input id="f-img" class="form-control" value="${escapeHtml_(route.Bild)}"></div>
      <button class="btn btn-accent w-100" type="button" onclick="saveRoute('${escapeHtml_(nr || "")}')">Spara led</button>
    </div>`;
}

function saveRoute(existingNr) {
  if (!canEditContentRole()) return showToast("Saknar behörighet");
  const route = {
    Nr: document.getElementById("f-nr").value.trim() || existingNr || "",
    Gradering: document.getElementById("f-grad").value,
    DagsAttByggaOm: document.getElementById("f-rebuild").value,
    Ledbyggare: document.getElementById("f-setter").value.trim(),
    Byggdatum: document.getElementById("f-build").value,
    Slutdatum: document.getElementById("f-end").value,
    Anteckningar: document.getElementById("f-notes").value.trim(),
    Bild: document.getElementById("f-img").value.trim()
  };
  const exists = route.Nr && db.routes.some((r) => String(r.Nr) === String(route.Nr));
  if ((!route.Nr || !exists) && !canManageRouteStructureRole()) {
    return showToast("Bara superadmin kan lägga till leder");
  }
  google.script.run
    .withSuccessHandler((res) => {
      if (!res || res.ok === false) return showToast((res && res.error) || "Kunde inte spara");
      const saved = normalizeRoute_((res && res.route) || route);
      const i = db.routes.findIndex((x) => String(x.Nr) === String(saved.Nr));
      if (i >= 0) db.routes[i] = saved;
      else if (canManageRouteStructureRole()) db.routes.push(saved);
      showToast("Led sparad");
      renderAdminHome();
      filterData();
    })
    .withFailureHandler(() => showToast("Kunde inte spara"))
    .saveRoute(route);
}

function deleteRoute(nr) {
  if (!canManageRouteStructureRole()) return showToast("Bara superadmin kan ta bort leder");
  if (!confirm("Radera led " + nr + " från sheetet?")) return;
  google.script.run
    .withSuccessHandler((res) => {
      if (!res || res.ok === false) return showToast((res && res.error) || "Kunde inte radera");
      db.routes = db.routes.filter((r) => String(r.Nr) !== String(nr));
      showToast("Led raderad");
      renderAdminHome();
      filterData();
    })
    .deleteRoute(nr);
}

function renderPasswordForm() {
  document.getElementById("admin-main").innerHTML = `
    <div class="admin-card">
      <button class="btn btn-sm btn-ghost mb-3" type="button" onclick="renderAdminHome()">← Tillbaka</button>
      <h3>Byt lösenord</h3>
      <div class="mb-3"><input id="pw-old" type="password" class="form-control" placeholder="Nuvarande lösenord"></div>
      <div class="mb-3"><input id="pw-new" type="password" class="form-control" placeholder="Nytt lösenord"></div>
      <button class="btn btn-accent w-100" type="button" onclick="changePassword()">Spara</button>
    </div>`;
}
function changePassword() {
  const oldPw = document.getElementById("pw-old").value;
  const newPw = document.getElementById("pw-new").value;
  if (!newPw || newPw.length < 6) return showToast("Nytt lösenord för kort");
  google.script.run
    .withSuccessHandler((res) => {
      if (!res || res.ok === false) return showToast((res && res.error) || "Kunde inte byta");
      showToast("Lösenord uppdaterat");
      renderAdminHome();
    })
    .changeOwnPassword(oldPw, newPw);
}

function renderUserManagement() {
  if (!canManageUsersRole()) return;
  document.getElementById("admin-main").innerHTML = `
    <div class="admin-card">
      <button class="btn btn-sm btn-ghost mb-3" type="button" onclick="renderAdminHome()">← Tillbaka</button>
      <h3>Användare</h3>
      <p class="small mb-3" style="color:var(--muted);">Samma Users-struktur som Crags (Username, passwordHash, salt, role, name, FirstLogin).</p>
      <div class="row g-2 mb-3">
        <div class="col-6"><input id="nu-user" class="form-control form-control-sm" placeholder="Användarnamn"></div>
        <div class="col-6"><input id="nu-name" class="form-control form-control-sm" placeholder="Namn"></div>
        <div class="col-6">
          <select id="nu-role" class="form-select form-select-sm">
            <option value="admin">Admin</option>
            <option value="scout">Sättare</option>
            <option value="superadmin">Superadmin</option>
          </select>
        </div>
        <div class="col-6"><input id="nu-pw" class="form-control form-control-sm" placeholder="Temp-lösenord" value="changeme"></div>
      </div>
      <button class="btn btn-accent btn-sm mb-3" type="button" onclick="createUser()">Skapa användare</button>
      <div id="admin-user-list">Laddar…</div>
    </div>`;
  google.script.run
    .withSuccessHandler((users) => {
      const host = document.getElementById("admin-user-list");
      if (!host) return;
      host.innerHTML = (users || []).map((u) => `
        <div class="d-flex justify-content-between align-items-center py-2 border-bottom" style="border-color:var(--line)!important; gap:8px;">
          <div>
            <strong>${escapeHtml_(u.username)}</strong>
            <div class="small" style="color:var(--muted);">${escapeHtml_(u.name || "")}</div>
          </div>
          <div class="d-flex gap-2 align-items-center">
            <select class="form-select form-select-sm" style="width:auto;" onchange="updateRole('${escapeHtml_(u.username)}', this.value)">
              <option value="scout" ${u.role === "scout" ? "selected" : ""}>Sättare</option>
              <option value="admin" ${u.role === "admin" ? "selected" : ""}>Admin</option>
              <option value="superadmin" ${u.role === "superadmin" ? "selected" : ""}>Superadmin</option>
            </select>
            <button class="btn btn-sm btn-outline-danger" type="button" onclick="deleteUser('${escapeHtml_(u.username)}')">Radera</button>
          </div>
        </div>
      `).join("") || `<div class="empty">Inga användare.</div>`;
    })
    .getAllAdmins();
}

function createUser() {
  const payload = {
    username: document.getElementById("nu-user").value.trim(),
    name: document.getElementById("nu-name").value.trim(),
    role: document.getElementById("nu-role").value,
    password: document.getElementById("nu-pw").value
  };
  if (!payload.username) return showToast("Användarnamn saknas");
  google.script.run
    .withSuccessHandler((res) => {
      if (!res || res.ok === false) return showToast((res && res.error) || "Kunde inte skapa");
      showToast("Användare skapad");
      renderUserManagement();
    })
    .createNewAdmin(payload);
}
function updateRole(username, role) {
  google.script.run
    .withSuccessHandler((res) => {
      if (!res || res.ok === false) return showToast((res && res.error) || "Kunde inte uppdatera");
      showToast("Roll uppdaterad");
    })
    .updateUserRole(username, role);
}
function deleteUser(username) {
  if (!confirm("Radera användare " + username + "?")) return;
  google.script.run
    .withSuccessHandler((res) => {
      if (!res || res.ok === false) return showToast((res && res.error) || "Kunde inte radera");
      showToast("Användare raderad");
      renderUserManagement();
    })
    .deleteUserAction(username);
}
  </script>
